<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Instagram — art-rium</title>
  <link rel="stylesheet" href="/shared/shared.css">
  <style>
    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
      padding-top: env(safe-area-inset-top);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none; color: var(--accent);
      font-size: 22px; cursor: pointer; padding: 0 4px 0 0;
      -webkit-tap-highlight-color: transparent; line-height: 1;
    }
    header h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; flex: 1; }

    /* ── Main scroll area ── */
    main {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ─────────────────────────────────────────────
       TIMELINE
    ───────────────────────────────────────────── */
    #timeline-section { padding: 16px 16px 8px; }

    .section-label {
      font-size: 11px; font-weight: 700; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px;
    }

    .timeline-empty {
      text-align: center; padding: 32px 0; color: var(--text-dim); font-size: 14px;
    }

    /* Month group header */
    .month-group { margin-bottom: 4px; }
    .month-label {
      font-size: 12px; font-weight: 700; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.7px;
      padding: 8px 0 6px; border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    /* Post row */
    .post-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .post-row:last-child { border-bottom: none; }
    .post-row:active { background: var(--surface2); border-radius: 10px; margin: 0 -8px; padding-left: 8px; padding-right: 8px; }

    /* Thumbnail stack for timeline */
    .thumb-stack {
      position: relative;
      width: 60px; height: 60px;
      flex-shrink: 0;
    }
    .thumb-stack img, .thumb-stack .thumb-placeholder {
      position: absolute;
      width: 60px; height: 60px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface2);
    }
    .thumb-stack .thumb-back {
      top: -4px; left: 4px;
      opacity: 0.5;
      border-radius: 6px;
    }
    .thumb-stack .thumb-front {
      top: 0; left: 0;
    }
    .thumb-placeholder {
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .carousel-count-badge {
      position: absolute;
      bottom: 4px; right: 4px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 10px; font-weight: 700;
      border-radius: 5px;
      padding: 1px 5px;
      line-height: 1.4;
    }

    .post-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .post-date {
      font-size: 13px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    .post-caption {
      font-size: 13px; color: var(--text-dim); line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .post-title { font-size: 12px; color: var(--text-dim); font-style: italic; }

    .status-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 2px 7px; border-radius: 5px;
    }
    .status-scheduled { background: rgba(10,132,255,0.15); color: var(--accent); }
    .status-posted    { background: rgba(50,215,75,0.15);  color: var(--green); }
    .status-cancelled { background: var(--surface2); color: var(--text-dim); }
    .status-failed    { background: rgba(255,69,58,0.15); color: var(--red); }

    /* Companion post badges (story / reel) */
    .companion-row {
      display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px;
    }
    .companion-badge {
      font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 4px;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .companion-pending  { background: var(--surface2); color: var(--text-dim); }
    .companion-posted   { background: rgba(50,215,75,0.12); color: var(--green); }
    .companion-failed   { background: rgba(255,69,58,0.12); color: var(--red); }

    /* ─────────────────────────────────────────────
       NEW POST PANEL
    ───────────────────────────────────────────── */
    #new-post-section {
      padding: 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .new-post-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .new-post-card h2 {
      font-size: 15px; font-weight: 700;
    }

    /* Selected images strip */
    .selected-images-strip {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      min-height: 72px;
    }
    .selected-images-strip::-webkit-scrollbar { display: none; }

    .sel-img-wrap {
      position: relative;
      flex-shrink: 0;
      width: 72px; height: 72px;
    }
    .sel-img-wrap img {
      width: 72px; height: 72px;
      border-radius: 10px;
      object-fit: cover;
      display: block;
    }
    .sel-img-remove {
      position: absolute;
      top: -6px; right: -6px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      border: none;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .sel-img-order {
      position: absolute;
      bottom: 4px; left: 4px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 10px; font-weight: 700;
      border-radius: 4px;
      padding: 1px 5px;
    }

    .add-image-btn {
      flex-shrink: 0;
      width: 72px; height: 72px;
      border-radius: 10px;
      border: 1.5px dashed var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }
    .add-image-btn:active { border-color: var(--accent); }

    .images-hint {
      font-size: 12px; color: var(--text-dim);
    }

    /* Caption */
    textarea#caption-input {
      width: 100%; resize: none;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      padding: 11px 13px; outline: none; font-family: inherit; line-height: 1.5;
      transition: border-color 0.2s; -webkit-appearance: none;
      min-height: 80px;
    }
    textarea#caption-input:focus { border-color: var(--accent); }
    textarea#caption-input::placeholder { color: var(--text-dim); }

    /* Offset scheduling row */
    .schedule-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .schedule-row label {
      font-size: 13px; color: var(--text-dim); white-space: nowrap;
    }
    .offset-input {
      width: 64px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 15px; font-weight: 600;
      padding: 8px 10px; outline: none; font-family: inherit; text-align: center;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .offset-input:focus { border-color: var(--accent); }

    .computed-date {
      font-size: 13px; color: var(--text-dim);
      flex-basis: 100%; margin-top: -4px;
    }
    .computed-date strong { color: var(--text); font-weight: 600; }

    /* Submit */
    .schedule-btn {
      width: 100%; padding: 14px;
      border-radius: var(--radius); border: none;
      background: var(--accent); color: #000;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.13s;
      -webkit-tap-highlight-color: transparent;
    }
    .schedule-btn:disabled { opacity: 0.4; cursor: default; }
    .schedule-btn:not(:disabled):active { transform: scale(0.97); }

    /* ─────────────────────────────────────────────
       IMAGE PICKER MODAL
    ───────────────────────────────────────────── */
    #picker-modal {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }
    #picker-modal.show { display: flex; }

    .picker-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .picker-header h2 { font-size: 17px; font-weight: 700; flex: 1; }
    .picker-done-btn {
      background: var(--accent); border: none;
      color: #000; font-size: 14px; font-weight: 700;
      padding: 7px 16px; border-radius: 8px;
      cursor: pointer; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .picker-count-badge {
      background: var(--accent);
      color: #000;
      font-size: 12px; font-weight: 700;
      border-radius: 10px;
      padding: 2px 8px;
      display: none;
    }
    .picker-count-badge.show { display: inline-block; }

    .picker-search {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #picker-search-input {
      width: 100%;
      background: var(--surface2); border: 1.5px solid transparent;
      border-radius: 10px; color: var(--text); font-size: 15px;
      padding: 9px 14px; outline: none; font-family: inherit;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    #picker-search-input:focus { border-color: var(--accent); }
    #picker-search-input::placeholder { color: var(--text-dim); }

    #picker-grid {
      flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 3px;
    }

    .picker-cell {
      position: relative;
      height: 0;
      padding-bottom: 100%;
      cursor: pointer;
      overflow: hidden;
      border-radius: 4px;
      background: var(--surface2);
    }
    .picker-cell img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.15s;
    }
    .picker-cell:active img { opacity: 0.7; }

    /* Selection overlay on picker cell */
    .picker-cell .sel-overlay {
      position: absolute; inset: 0;
      background: rgba(10,132,255,0.35);
      display: none; align-items: center; justify-content: center;
      font-size: 28px; color: #fff;
    }
    .picker-cell.selected .sel-overlay { display: flex; }
    .picker-cell.selected { outline: 3px solid var(--accent); outline-offset: -3px; }

    .picker-cell .order-badge {
      position: absolute;
      top: 5px; left: 5px;
      background: var(--accent);
      color: #000;
      font-size: 11px; font-weight: 700;
      border-radius: 50%;
      width: 20px; height: 20px;
      display: none; align-items: center; justify-content: center;
    }
    .picker-cell.selected .order-badge { display: flex; }

    /* ─────────────────────────────────────────────
       POST DETAIL MODAL (edit/delete)
    ───────────────────────────────────────────── */
    #detail-modal {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      align-items: flex-end;
    }
    #detail-modal.show { display: flex; }

    .detail-sheet {
      width: 100%; max-width: 680px; margin: 0 auto;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(env(safe-area-inset-bottom) + 24px);
      display: flex; flex-direction: column; gap: 14px;
      max-height: 85dvh;
      overflow-y: auto;
    }

    .detail-sheet h2 { font-size: 16px; font-weight: 700; }

    /* Carousel thumbnail strip in detail modal */
    .detail-thumb-strip {
      display: flex; gap: 8px; overflow-x: auto;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .detail-thumb-strip::-webkit-scrollbar { display: none; }

    .detail-thumb-strip img {
      width: 72px; height: 72px;
      border-radius: 10px; object-fit: cover;
      flex-shrink: 0; background: var(--surface2);
    }

    .detail-meta { display: flex; flex-direction: column; gap: 4px; }
    .detail-meta .detail-date { font-size: 14px; font-weight: 600; }
    .detail-meta .detail-title { font-size: 13px; color: var(--text-dim); }

    textarea#detail-caption {
      width: 100%; resize: none;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      padding: 11px 13px; outline: none; font-family: inherit; line-height: 1.5;
      transition: border-color 0.2s; min-height: 80px;
    }
    textarea#detail-caption:focus { border-color: var(--accent); }

    .detail-actions { display: flex; gap: 10px; }
    .detail-btn {
      flex: 1; padding: 13px; border-radius: var(--radius); border: none;
      font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
      -webkit-tap-highlight-color: transparent; transition: all 0.13s;
    }
    .detail-btn:active { transform: scale(0.97); }
    .detail-btn.save { background: var(--accent); color: #000; }
    .detail-btn.post-now { background: var(--green); color: #000; }
    .detail-btn.mark-posted { background: rgba(50,215,75,0.15); color: var(--green); border: 1.5px solid rgba(50,215,75,0.3); }
    .detail-btn.cancel-post { background: var(--surface2); color: var(--text-dim); border: 1.5px solid var(--border); }
    .detail-btn.delete { background: rgba(255,69,58,0.12); color: var(--red); border: 1.5px solid rgba(255,69,58,0.2); }

    /* toast */
    #toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 100px); left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 14px; font-weight: 500;
      padding: 10px 18px; border-radius: 20px;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: rgba(255,69,58,0.2); color: var(--red); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <button class="back-btn" onclick="history.back()">‹</button>
    <h1>Instagram Scheduler</h1>
    <div class="dot" id="dot" style="opacity:0"></div>
  </header>

  <!-- ── Timeline ── -->
  <main id="main-scroll">
    <div id="timeline-section">
      <div class="section-label">Scheduled Posts</div>
      <div id="timeline-list">
        <div class="timeline-empty">No posts scheduled yet.</div>
      </div>
    </div>
  </main>

  <!-- ── New Post Panel ── -->
  <div id="new-post-section">
    <div class="new-post-card">
      <h2>Schedule a Post</h2>

      <!-- Selected images strip -->
      <div>
        <div class="selected-images-strip" id="selected-images-strip">
          <button class="add-image-btn" id="add-image-btn" onclick="openPicker()">+</button>
        </div>
        <div class="images-hint" id="images-hint">Tap + to add images. Add multiple for a carousel (up to 10).</div>
      </div>

      <!-- Caption -->
      <textarea id="caption-input" placeholder="Write a caption…" rows="3"></textarea>

      <!-- Offset scheduling -->
      <div class="schedule-row">
        <label>Post</label>
        <input class="offset-input" type="number" id="offset-days" value="2" min="0" max="365">
        <label>days after last scheduled post</label>
      </div>
      <div class="computed-date" id="computed-date-line">—</div>

      <button class="schedule-btn" id="schedule-btn" onclick="schedulePost()" disabled>
        Schedule Post
      </button>
    </div>
  </div>

</div>

<!-- ── Image Picker Modal ── -->
<div id="picker-modal">
  <div class="picker-header">
    <button class="back-btn" onclick="closePicker()">✕</button>
    <h2>Choose Images</h2>
    <span class="picker-count-badge" id="picker-count-badge">0</span>
    <button class="picker-done-btn" onclick="closePicker()">Done</button>
  </div>
  <div class="picker-search">
    <input type="search" id="picker-search-input" placeholder="Search by prompt or title…"
           autocomplete="off" spellcheck="false">
  </div>
  <div id="picker-grid"></div>
</div>

<!-- ── Post Detail Modal ── -->
<div id="detail-modal" onclick="closeDetail(event)">
  <div class="detail-sheet" onclick="event.stopPropagation()">
    <h2>Edit Scheduled Post</h2>

    <!-- Thumbnail strip (single or carousel) -->
    <div class="detail-thumb-strip" id="detail-thumb-strip"></div>

    <div class="detail-meta">
      <div class="detail-date" id="detail-date"></div>
      <div class="detail-title" id="detail-title-text"></div>
      <div id="detail-status-badge"></div>
    </div>

    <textarea id="detail-caption" placeholder="Caption…" rows="3"></textarea>

    <div class="detail-actions">
      <button class="detail-btn save" onclick="saveDetail()">Save</button>
      <button class="detail-btn post-now" id="detail-post-now" onclick="postNow()">Post Now</button>
    </div>
    <div class="detail-actions" id="detail-secondary-actions">
      <button class="detail-btn mark-posted" id="detail-mark-posted" onclick="markPosted()">Mark as Posted</button>
      <button class="detail-btn cancel-post" onclick="cancelPost()">Cancel</button>
      <button class="detail-btn delete" onclick="deletePost()">Delete</button>
    </div>
    <div class="detail-actions" id="detail-retry-row" style="display:none">
      <button class="detail-btn save" id="detail-retry-btn" onclick="retryPost()" style="display:none">Retry (reschedule)</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/shared/shared.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  apiKey:     ArtRium.getApiKey(),
  // Selected images for new post — ordered array of {id, filename, title, thumb_url}
  selectedImages: [],
  lastPostDate: null,   // ISO string or null
  posts: [],            // array of post objects from API
  activePost: null,     // post being edited in detail modal
  pickerImages: [],
  pickerSearch: '',
  pickerPage: 0,
  pickerLoading: false,
  pickerDone: false,
  // Map of image_id → order (1-based) for currently-open picker session
  pickerSelection: new Map(),  // id -> order
};

const PICKER_LIMIT = 30;
const MAX_CAROUSEL = 10;

// ── API helpers ───────────────────────────────────────────────────────────────
const api      = (url, opts = {}) => ArtRium.apiFetch(url, opts, state.apiKey);
const withAuth = (url) => ArtRium.withAuth(url, state.apiKey);

// ── Utility ───────────────────────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);

const fmtDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })
    + ' · ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
};

const fmtMonth = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
};

const statusLabel = (s) => ({ scheduled: 'Scheduled', posted: 'Posted', cancelled: 'Cancelled', failed: 'Failed' }[s] || s);
const statusClass = (s) => `status-badge status-${s}`;
const _companionIcon = (s) => s === 'posted' ? '✓' : s === 'failed' ? '✕' : '…';

// ── Timeline rendering ────────────────────────────────────────────────────────
function renderTimeline() {
  const list = $('timeline-list');
  if (!state.posts.length) {
    list.innerHTML = '<div class="timeline-empty">No posts scheduled yet.</div>';
    return;
  }

  // Group by month
  const groups = {};
  for (const p of state.posts) {
    const key = fmtMonth(p.scheduled_at);
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  }

  list.innerHTML = '';
  for (const [month, posts] of Object.entries(groups)) {
    const grp = document.createElement('div');
    grp.className = 'month-group';
    grp.innerHTML = `<div class="month-label">${month}</div>`;

    for (const p of posts) {
      const row = document.createElement('div');
      row.className = 'post-row';
      row.onclick = () => openDetail(p);

      // Build thumbnail stack
      const imgs = p.carousel_images || [];
      const isCarousel = p.is_carousel && imgs.length > 1;
      let thumbHTML;
      if (isCarousel) {
        const front = imgs[0];
        const back  = imgs[1];
        thumbHTML = `
          <div class="thumb-stack">
            <img class="thumb-back" src="${withAuth(back.thumb_url)}" alt="">
            <img class="thumb-front" src="${withAuth(front.thumb_url)}" alt="">
            <span class="carousel-count-badge">${imgs.length}</span>
          </div>`;
      } else if (imgs.length === 1) {
        thumbHTML = `<div class="thumb-stack"><img class="thumb-front" src="${withAuth(imgs[0].thumb_url)}" alt=""></div>`;
      } else {
        thumbHTML = `<div class="thumb-stack"><div class="thumb-front thumb-placeholder">🖼</div></div>`;
      }

      const captionPreview = p.caption
        ? p.caption.replace(/\n/g, ' ')
        : '<em>No caption</em>';
      const titleText = p.image?.title || p.image?.filename || '';

      // Companion badges (story + reel) — only shown once feed post is live
      let companionHTML = '';
      if (p.status === 'posted') {
        const storyClass = p.story_status === 'posted' ? 'companion-posted'
                         : p.story_status === 'failed' ? 'companion-failed'
                         : p.story_status === 'pending' ? 'companion-pending' : '';
        const reelClass  = p.reel_status  === 'posted' ? 'companion-posted'
                         : p.reel_status  === 'failed' ? 'companion-failed'
                         : p.reel_status  === 'pending' ? 'companion-pending' : '';
        const storyBadge = storyClass
          ? `<span class="companion-badge ${storyClass}">Story ${_companionIcon(p.story_status)}</span>` : '';
        const reelBadge  = reelClass
          ? `<span class="companion-badge ${reelClass}">Reel ${_companionIcon(p.reel_status)}</span>`  : '';
        if (storyBadge || reelBadge) {
          companionHTML = `<div class="companion-row">${storyBadge}${reelBadge}</div>`;
        }
      }

      row.innerHTML = `
        ${thumbHTML}
        <div class="post-info">
          <div class="post-date">
            ${fmtDate(p.scheduled_at)}
            <span class="${statusClass(p.status)}">${statusLabel(p.status)}</span>
          </div>
          ${titleText ? `<div class="post-title">${isCarousel ? '📸 ' : ''}${titleText}</div>` : ''}
          <div class="post-caption">${captionPreview}</div>
          ${companionHTML}
        </div>
      `;
      grp.appendChild(row);
    }
    list.appendChild(grp);
  }
}

// ── Load timeline ─────────────────────────────────────────────────────────────
async function loadTimeline() {
  try {
    const r = await api('/api/instagram/posts');
    state.posts = await r.json();
    renderTimeline();
  } catch (e) {
    ArtRium.toast('Failed to load posts', true);
  }
}

// ── Load last-post date + update computed date ────────────────────────────────
async function loadLastPost() {
  try {
    const r = await api('/api/instagram/last-post');
    const d = await r.json();
    state.lastPostDate = d.scheduled_at;
    updateComputedDate();
  } catch (_) {}
}

function updateComputedDate() {
  const offsetDays = parseInt($('offset-days').value, 10) || 0;
  let base;

  if (state.lastPostDate) {
    base = new Date(state.lastPostDate);
  } else {
    base = new Date();
    base.setHours(9, 0, 0, 0);
  }

  const target = new Date(base.getTime() + offsetDays * 86400000);
  const label = state.lastPostDate ? 'Last post' : 'No posts yet — starts';
  $('computed-date-line').innerHTML = `${label}: will post on <strong>${fmtDate(target.toISOString())}</strong>`;
  state.computedDate = target.toISOString();
  updateScheduleBtn();
}

function updateScheduleBtn() {
  $('schedule-btn').disabled = state.selectedImages.length === 0;
}

// ── Selected images strip (new post form) ─────────────────────────────────────
function renderSelectedStrip() {
  const strip = $('selected-images-strip');
  // Remove all sel-img-wrap elements
  strip.querySelectorAll('.sel-img-wrap').forEach(el => el.remove());

  const addBtn = $('add-image-btn');

  state.selectedImages.forEach((img, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'sel-img-wrap';
    wrap.innerHTML = `
      <img src="${withAuth(img.thumb_url)}" alt="">
      <span class="sel-img-order">${idx + 1}</span>
      <button class="sel-img-remove" onclick="removeSelectedImage(${idx})">×</button>
    `;
    strip.insertBefore(wrap, addBtn);
  });

  // Hide add button if at max
  addBtn.style.display = state.selectedImages.length >= MAX_CAROUSEL ? 'none' : '';

  // Update hint
  const n = state.selectedImages.length;
  $('images-hint').textContent = n === 0
    ? 'Tap + to add images. Add multiple for a carousel (up to 10).'
    : n === 1
      ? '1 image selected. Add more for a carousel.'
      : `${n} images — carousel post.`;

  updateScheduleBtn();
}

function removeSelectedImage(idx) {
  state.selectedImages.splice(idx, 1);
  renderSelectedStrip();
}

// ── Image picker ──────────────────────────────────────────────────────────────
function openPicker() {
  // Seed picker selection from current selectedImages
  state.pickerSelection = new Map(state.selectedImages.map((img, i) => [img.id, i + 1]));
  $('picker-modal').classList.add('show');
  if (!state.pickerImages.length) loadPickerImages(true);
  else refreshPickerCellSelections();
  updatePickerBadge();
}

function closePicker() {
  $('picker-modal').classList.remove('show');
  // Sync pickerSelection → selectedImages (preserving order)
  // Build ordered array from pickerSelection
  const ordered = [...state.pickerSelection.entries()]
    .sort((a, b) => a[1] - b[1])
    .map(([id]) => state.pickerImages.find(img => img.id === id))
    .filter(Boolean);
  // Preserve any previously-selected images not in current grid
  const inGrid = new Set(state.pickerImages.map(i => i.id));
  const preserved = state.selectedImages.filter(img => !inGrid.has(img.id));
  state.selectedImages = [...ordered, ...preserved];
  renderSelectedStrip();
}

async function loadPickerImages(reset = false) {
  if (state.pickerLoading) return;
  if (!reset && state.pickerDone) return;

  if (reset) {
    state.pickerImages = [];
    state.pickerPage = 0;
    state.pickerDone = false;
    $('picker-grid').innerHTML = '';
  }

  state.pickerLoading = true;
  const offset = state.pickerPage * PICKER_LIMIT;
  const search = state.pickerSearch ? `&search=${encodeURIComponent(state.pickerSearch)}` : '';

  try {
    const r = await api(`/api/images?limit=${PICKER_LIMIT}&offset=${offset}${search}`);
    const imgs = await r.json();

    if (imgs.length < PICKER_LIMIT) state.pickerDone = true;
    state.pickerPage++;
    state.pickerImages.push(...imgs);
    appendPickerCells(imgs);
  } catch (e) {
    ArtRium.toast('Failed to load images', true);
  } finally {
    state.pickerLoading = false;
  }
}

function appendPickerCells(imgs) {
  const grid = $('picker-grid');
  for (const img of imgs) {
    const cell = document.createElement('div');
    cell.className = 'picker-cell';
    cell.dataset.id = img.id;
    const order = state.pickerSelection.get(img.id);
    if (order !== undefined) cell.classList.add('selected');
    cell.innerHTML = `
      <img src="${withAuth(img.thumb_url)}" alt="">
      <div class="sel-overlay">✓</div>
      <div class="order-badge">${order || ''}</div>
    `;
    cell.onclick = () => togglePickerCell(cell, img);
    grid.appendChild(cell);
  }
}

function togglePickerCell(cell, img) {
  if (state.pickerSelection.has(img.id)) {
    // Deselect
    const removedOrder = state.pickerSelection.get(img.id);
    state.pickerSelection.delete(img.id);
    // Re-number remaining
    const sorted = [...state.pickerSelection.entries()].sort((a, b) => a[1] - b[1]);
    state.pickerSelection = new Map(sorted.map(([id], i) => [id, i + 1]));
  } else {
    // Select (if under limit)
    if (state.pickerSelection.size >= MAX_CAROUSEL) {
      ArtRium.toast(`Maximum ${MAX_CAROUSEL} images per post`, true);
      return;
    }
    state.pickerSelection.set(img.id, state.pickerSelection.size + 1);
  }
  refreshPickerCellSelections();
  updatePickerBadge();
}

function refreshPickerCellSelections() {
  $('picker-grid').querySelectorAll('.picker-cell').forEach(cell => {
    const id = cell.dataset.id;
    const order = state.pickerSelection.get(id);
    cell.classList.toggle('selected', order !== undefined);
    const badge = cell.querySelector('.order-badge');
    if (badge) badge.textContent = order !== undefined ? order : '';
  });
}

function updatePickerBadge() {
  const n = state.pickerSelection.size;
  const badge = $('picker-count-badge');
  badge.textContent = n;
  badge.classList.toggle('show', n > 0);
}

// Picker search (debounced)
let _searchTimer;
$('picker-search-input').addEventListener('input', (e) => {
  clearTimeout(_searchTimer);
  state.pickerSearch = e.target.value;
  _searchTimer = setTimeout(() => loadPickerImages(true), 350);
});

// Picker infinite scroll
$('picker-grid').addEventListener('scroll', () => {
  const el = $('picker-grid');
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - 80) {
    loadPickerImages(false);
  }
});

// ── Schedule new post ─────────────────────────────────────────────────────────
async function schedulePost() {
  if (state.selectedImages.length === 0) return;
  const btn = $('schedule-btn');
  btn.disabled = true;
  btn.textContent = 'Scheduling…';

  const [primary, ...rest] = state.selectedImages;

  try {
    const body = {
      image_id:           primary.id,
      carousel_image_ids: rest.length > 0 ? rest.map(img => img.id) : null,
      caption:            $('caption-input').value.trim() || null,
      scheduled_at:       state.computedDate,
    };
    await api('/api/instagram/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    ArtRium.toast(rest.length > 0 ? `Carousel (${state.selectedImages.length} images) scheduled ✓` : 'Post scheduled ✓');

    // Reset form
    state.selectedImages = [];
    state.pickerImages = [];
    state.pickerPage = 0;
    state.pickerDone = false;
    $('picker-grid').innerHTML = '';
    $('caption-input').value = '';
    renderSelectedStrip();

    await loadTimeline();
    await loadLastPost();
  } catch (e) {
    ArtRium.toast(e.message || 'Failed to schedule', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Schedule Post';
    updateScheduleBtn();
  }
}

// ── Detail modal ──────────────────────────────────────────────────────────────
function openDetail(post) {
  state.activePost = post;

  // Build thumbnail strip
  const strip = $('detail-thumb-strip');
  strip.innerHTML = '';
  const imgs = post.carousel_images || [];
  if (imgs.length === 0 && post.image) {
    imgs.push(post.image);
  }
  for (const img of imgs) {
    const el = document.createElement('img');
    el.src = withAuth(img.thumb_url);
    el.alt = '';
    strip.appendChild(el);
  }

  $('detail-date').textContent = fmtDate(post.scheduled_at);
  const titleText = post.image?.title || post.image?.filename || '';
  $('detail-title-text').textContent = post.is_carousel
    ? `Carousel · ${imgs.length} images${titleText ? ' · ' + titleText : ''}`
    : titleText;
  $('detail-status-badge').innerHTML = `<span class="${statusClass(post.status)}">${statusLabel(post.status)}</span>`;
  $('detail-caption').value = post.caption || '';

  const isPosted = post.status === 'posted';
  const isFailed = post.status === 'failed';
  $('detail-post-now').style.display    = isPosted ? 'none' : '';
  $('detail-mark-posted').style.display = isPosted ? 'none' : '';
  $('detail-retry-row').style.display = isFailed ? '' : 'none';
  $('detail-retry-btn').style.display = isFailed ? '' : 'none';

  $('detail-modal').classList.add('show');
}

function closeDetail(e) {
  if (!e || e.target === $('detail-modal')) {
    $('detail-modal').classList.remove('show');
    state.activePost = null;
  }
}

async function saveDetail() {
  if (!state.activePost) return;
  try {
    await api(`/api/instagram/posts/${state.activePost.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ caption: $('detail-caption').value.trim() || null }),
    });
    ArtRium.toast('Saved ✓');
    closeDetail();
    await loadTimeline();
  } catch (e) {
    ArtRium.toast(e.message || 'Save failed', true);
  }
}

async function postNow() {
  if (!state.activePost) return;
  const btn = $('detail-post-now');
  btn.disabled = true;
  btn.textContent = 'Posting…';
  try {
    const r = await api(`/api/instagram/posts/${state.activePost.id}/post-now`, { method: 'POST' });
    const d = await r.json();
    ArtRium.toast(`Posted ✓  (${d.media_id})`);
    closeDetail();
    await Promise.all([loadTimeline(), loadLastPost()]);
  } catch (e) {
    ArtRium.toast(e.message || 'Post failed', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Post Now';
  }
}

async function markPosted() {
  if (!state.activePost) return;
  try {
    await api(`/api/instagram/posts/${state.activePost.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'posted' }),
    });
    ArtRium.toast('Marked as posted ✓');
    closeDetail();
    await Promise.all([loadTimeline(), loadLastPost()]);
  } catch (e) {
    ArtRium.toast(e.message || 'Failed', true);
  }
}

async function cancelPost() {
  if (!state.activePost) return;
  try {
    await api(`/api/instagram/posts/${state.activePost.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'cancelled' }),
    });
    ArtRium.toast('Post cancelled');
    closeDetail();
    await Promise.all([loadTimeline(), loadLastPost()]);
  } catch (e) {
    ArtRium.toast(e.message || 'Failed', true);
  }
}

async function retryPost() {
  if (!state.activePost) return;
  try {
    await api(`/api/instagram/posts/${state.activePost.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'scheduled' }),
    });
    ArtRium.toast('Re-queued — will post within 1 minute');
    closeDetail();
    await Promise.all([loadTimeline(), loadLastPost()]);
  } catch (e) {
    ArtRium.toast(e.message || 'Failed', true);
  }
}

async function deletePost() {
  if (!state.activePost) return;
  try {
    await api(`/api/instagram/posts/${state.activePost.id}`, { method: 'DELETE' });
    ArtRium.toast('Deleted');
    closeDetail();
    await Promise.all([loadTimeline(), loadLastPost()]);
  } catch (e) {
    ArtRium.toast(e.message || 'Delete failed', true);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
$('offset-days').addEventListener('input', updateComputedDate);

window.addEventListener('load', async () => {
  const dot = $('dot');
  dot.style.opacity = '1';
  ArtRium.setDot('connecting');

  ArtRium.connectWs({
    clientId:       ArtRium.getClientId(),
    getApiKey:      () => state.apiKey,
    onMessage:      () => {},
    onConnecting:   () => ArtRium.setDot('connecting'),
    onConnected:    () => ArtRium.setDot('connected'),
    onDisconnected: () => ArtRium.setDot('disconnected'),
  });

  renderSelectedStrip();
  await Promise.all([loadTimeline(), loadLastPost()]);
});
</script>
