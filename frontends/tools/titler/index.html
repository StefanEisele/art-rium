<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Titler">
  <title>Image Titler — art-rium</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="/shared/shared.css">
  <style>
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
      padding-top: env(safe-area-inset-top);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; flex: 1; }

    /* ══════════════ VIEWS ══════════════ */
    .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    /* ══════════════ PICKER VIEW ══════════════ */
    .picker-hint {
      padding: 10px 16px 8px;
      font-size: 13px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .picker-grid-wrap {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 12px 0;
    }

    .picker-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .picker-item {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .picker-img-wrap {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface2);
      aspect-ratio: 1;
      border: 2.5px solid transparent;
      transition: border-color 0.15s;
    }
    .picker-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .picker-item.selected .picker-img-wrap { border-color: var(--accent); }
    .picker-item .check {
      position: absolute; top: 5px; right: 5px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #000;
      font-size: 13px; font-weight: 700;
      display: none; align-items: center; justify-content: center;
    }
    .picker-item.selected .check { display: flex; }

    .picker-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      line-height: 1.3;
      padding: 0 2px 2px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .picker-title.placeholder {
      font-style: italic;
      opacity: 0.55;
    }

    .picker-load-more {
      padding: 14px 0 calc(env(safe-area-inset-bottom) + 16px);
      display: flex; justify-content: center;
    }

    /* ── Sticky bottom bar ── */
    .picker-bar {
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex; gap: 10px; align-items: center;
    }

    .selected-thumb {
      width: 44px; height: 44px;
      border-radius: 8px; object-fit: cover;
      display: none; flex-shrink: 0;
      border: 2px solid var(--accent);
    }
    .selected-thumb.show { display: block; }

    .generate-btn {
      flex: 1;
      background: var(--accent); color: #000;
      font-size: 16px; font-weight: 700;
      padding: 13px;
      border: none; border-radius: var(--radius);
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .generate-btn:disabled { opacity: 0.35; cursor: default; }
    .generate-btn:active:not(:disabled) { background: var(--accent-tap); }

    /* ══════════════ RESULTS VIEW ══════════════ */
    .results-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px 0;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Selected image card ── */
    .img-preview-row {
      display: flex; align-items: center; gap: 12px;
    }

    .img-preview-thumb {
      width: 72px; height: 72px;
      border-radius: 10px; object-fit: cover;
      flex-shrink: 0;
    }

    .img-preview-info { flex: 1; min-width: 0; }
    .img-preview-title {
      font-size: 13px; font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .img-preview-current {
      font-size: 15px; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .img-preview-current.placeholder { color: var(--text-dim); font-weight: 400; font-style: italic; }

    .change-btn {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text-dim);
      font-size: 13px; padding: 7px 12px;
      cursor: pointer; font-family: inherit;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .change-btn:active { background: var(--surface); }

    /* ── Progress ── */
    #progress-block {
      display: none;
      flex-direction: column; gap: 10px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
    }
    #progress-block.show { display: flex; }

    .prog-label { font-size: 14px; font-weight: 600; }
    .prog-sub   { font-size: 12px; color: var(--text-dim); }

    /* prog-track comes from shared.css */
    .prog-bar-inner {
      height: 100%; background: var(--accent); border-radius: 2px;
      width: 0%; transition: width 0.35s ease;
    }
    /* Indeterminate animation for Ollama (no step progress) */
    .prog-bar-inner.indeterminate {
      width: 100%;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 40%, var(--accent) 60%, transparent 100%);
      background-size: 200% 100%;
      animation: slide 1.6s linear infinite;
    }
    @keyframes slide { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Title cards ── */
    .titles-section-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.7px;
    }

    .titles-list { display: flex; flex-direction: column; gap: 8px; }

    .title-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .title-card:active { background: var(--surface2); }
    .title-card.selected {
      border-color: var(--accent);
      background: rgba(245, 166, 35, 0.07);
    }

    .title-card-text {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
    }

    /* ── Save bar ── */
    .results-bar {
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .save-btn {
      width: 100%;
      background: var(--accent); color: #000;
      font-size: 16px; font-weight: 700;
      padding: 14px;
      border: none; border-radius: var(--radius);
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn:disabled { opacity: 0.35; cursor: default; }
    .save-btn:active:not(:disabled) { background: var(--accent-tap); }

    /* ── Load more in picker ── */
    .load-more-btn {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 14px; font-weight: 600;
      padding: 11px 24px; cursor: pointer; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .load-more-btn:disabled { opacity: 0.4; cursor: default; }

    /* Mode chips in header */
    .mode-chips { display: flex; gap: 6px; }
    .mode-chip { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 6px;
                 border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-dim);
                 cursor: pointer; font-family: inherit; transition: all 0.13s; }
    .mode-chip.active { background: var(--accent); border-color: var(--accent); color: #000; }

    /* Video tile — slight differentiator vs image tile (transparent play badge) */
    .picker-img-wrap .video-tile-badge {
      position: absolute; top: 5px; left: 5px;
      width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45); color: rgba(255,255,255,0.92);
      font-size: 11px; pointer-events: none;
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <a class="back-btn" href="/" title="Dashboard">‹</a>
    <h1 id="header-title">Image Titler</h1>
    <div class="mode-chips" id="mode-chips" style="display:flex;gap:6px;">
      <button class="mode-chip active" data-mode="image" onclick="setMode('image')">Images</button>
      <button class="mode-chip" data-mode="video" onclick="setMode('video')">Videos</button>
    </div>
  </header>

  <!-- ══ VIEW: PICKER ══ -->
  <div class="view active" id="view-picker">

    <p class="picker-hint" id="picker-hint">Select an image to generate titles for.</p>

    <div class="picker-grid-wrap">
      <div class="picker-grid" id="picker-grid"></div>
      <div class="picker-load-more" id="picker-footer" style="display:none">
        <button class="load-more-btn" id="picker-load-more" onclick="loadMoreImages()">Load more</button>
      </div>
    </div>

    <div class="picker-bar">
      <img class="selected-thumb" id="selected-thumb" src="" alt="">
      <button class="generate-btn" id="generate-btn" disabled onclick="startTitling()">
        Select an image first
      </button>
    </div>

  </div>

  <!-- ══ VIEW: RESULTS ══ -->
  <div class="view" id="view-results">

    <div class="results-scroll" id="results-scroll">

      <!-- Image row -->
      <div class="img-preview-row">
        <img class="img-preview-thumb" id="preview-thumb" src="" alt="">
        <div class="img-preview-info">
          <div class="img-preview-title">Current title</div>
          <div class="img-preview-current placeholder" id="preview-current">None</div>
        </div>
        <button class="change-btn" onclick="switchView('picker')">Change</button>
      </div>

      <!-- Progress -->
      <div id="progress-block">
        <div class="prog-label" id="prog-label">Sending to Ollama…</div>
        <div class="prog-sub" id="prog-sub">This may take 30–60 seconds</div>
        <div class="prog-track"><div class="prog-bar-inner indeterminate" id="prog-bar"></div></div>
      </div>

      <!-- Titles -->
      <div id="titles-section" style="display:none">
        <div class="titles-section-label" style="margin-bottom:10px">Generated Titles</div>
        <div class="titles-list" id="titles-list"></div>
      </div>

    </div>

    <div class="results-bar">
      <button class="save-btn" id="save-btn" disabled onclick="saveTitle()">
        Select a title to save
      </button>
    </div>

  </div>

</div>

<div id="toast"></div>

<script src="/shared/shared.js"></script>
<script>
// ══════════════════════════════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════════════════════════════
const PAGE_SIZE = 60;

const state = {
  apiKey:   ArtRium.getApiKey(),
  mode:     'image',     // 'image' | 'video'
  images:   [],
  offset:   0,
  hasMore:  false,
  selected: null,
  titles:   [],
  chosenTitle: null,
};

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);

const withAuth = (url) => ArtRium.withAuth(url, state.apiKey);
const apiFetch = (url, opts = {}) => ArtRium.apiFetch(url, opts, state.apiKey);

// ══════════════════════════════════════════════════════════
// VIEW SWITCHING
// ══════════════════════════════════════════════════════════
const switchView = (name) => {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  $('view-' + name).classList.add('active');
};

// ══════════════════════════════════════════════════════════
// MODE TOGGLE
// ══════════════════════════════════════════════════════════
const setMode = (mode) => {
  if (mode === state.mode) return;
  if (mode !== 'image' && mode !== 'video') return;
  state.mode = mode;
  document.querySelectorAll('.mode-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.mode === mode);
  });
  $('header-title').textContent = mode === 'video' ? 'Video Titler' : 'Image Titler';
  $('picker-hint').textContent = mode === 'video'
    ? 'Select a video — 3 sample frames will be sent to the VLM.'
    : 'Select an image to generate titles for.';
  $('generate-btn').textContent = 'Select ' + (mode === 'video' ? 'a video' : 'an image') + ' first';
  state.selected = null;
  $('selected-thumb').classList.remove('show');
  $('generate-btn').disabled = true;
  switchView('picker');
  loadImages(true);
};

// ══════════════════════════════════════════════════════════
// PICKER (handles both modes — images via /api/images, videos via /api/video)
// ══════════════════════════════════════════════════════════
const loadImages = async (reset = false) => {
  if (reset) {
    state.images = [];
    state.offset = 0;
    $('picker-grid').innerHTML = '';
    $('picker-footer').style.display = 'none';
  }

  try {
    let data;
    if (state.mode === 'video') {
      // Videos endpoint returns all videos in one shot — no pagination needed
      // for typical art-rium volumes. Filter to status='done' so the picker
      // only shows completed videos.
      const r = await apiFetch('/api/video');
      const all = await r.json();
      data = all.filter(v => v.status === 'done' && v.thumb_url);
      state.hasMore = false;
    } else {
      const r = await apiFetch(`/api/images?limit=${PAGE_SIZE}&offset=${state.offset}`);
      data = await r.json();
      state.offset += data.length;
      state.hasMore = data.length === PAGE_SIZE;
    }

    state.images.push(...data);

    data.forEach((item, i) => {
      const globalIdx = state.images.length - data.length + i;
      $('picker-grid').appendChild(makePickerItem(item, globalIdx));
    });

    $('picker-footer').style.display = state.hasMore ? 'flex' : 'none';
    $('picker-load-more').disabled = false;
  } catch (e) {
    ArtRium.toast('Failed to load ' + (state.mode === 'video' ? 'videos' : 'images') + ': ' + e.message, true);
  }
};

const makePickerItem = (item, idx) => {
  const div = document.createElement('div');
  div.className = 'picker-item';
  div.dataset.idx = idx;

  const wrap = document.createElement('div');
  wrap.className = 'picker-img-wrap';

  const image = document.createElement('img');
  image.src = withAuth(item.thumb_url);
  image.loading = 'lazy';
  image.alt = item.filename || '';

  const check = document.createElement('div');
  check.className = 'check';
  check.textContent = '✓';

  wrap.appendChild(image);
  if (state.mode === 'video') {
    const badge = document.createElement('div');
    badge.className = 'video-tile-badge';
    badge.textContent = '▶';
    wrap.appendChild(badge);
  }
  wrap.appendChild(check);
  div.appendChild(wrap);

  const titleEl = document.createElement('div');
  titleEl.className = 'picker-title' + (item.title ? '' : ' placeholder');
  titleEl.textContent = item.title || 'No title';
  div.appendChild(titleEl);

  div.onclick = () => selectImage(idx);
  return div;
};

const selectImage = (idx) => {
  document.querySelectorAll('.picker-item.selected').forEach(el => el.classList.remove('selected'));

  const item = state.images[idx];
  state.selected = item;

  document.querySelector(`.picker-item[data-idx="${idx}"]`).classList.add('selected');

  const thumb = $('selected-thumb');
  thumb.src = withAuth(item.thumb_url);
  thumb.classList.add('show');

  const btn = $('generate-btn');
  btn.textContent = 'Generate Titles →';
  btn.disabled = false;
};

const loadMoreImages = () => {
  $('picker-load-more').disabled = true;
  loadImages(false);
};

// ══════════════════════════════════════════════════════════
// TITLING FLOW
// ══════════════════════════════════════════════════════════
const startTitling = async () => {
  if (!state.selected) return;

  switchView('results');

  $('preview-thumb').src = withAuth(state.selected.thumb_url);
  const currentEl = $('preview-current');
  if (state.selected.title) {
    currentEl.textContent = state.selected.title;
    currentEl.classList.remove('placeholder');
  } else {
    currentEl.textContent = 'None';
    currentEl.classList.add('placeholder');
  }

  $('titles-section').style.display = 'none';
  $('titles-list').innerHTML = '';
  state.titles = [];
  state.chosenTitle = null;
  $('save-btn').disabled = true;
  $('save-btn').textContent = 'Select a title to save';

  const isVideo = state.mode === 'video';
  showProgress(
    'Generating titles…',
    isVideo
      ? 'Sampling 3 frames + VLM — usually 15–45 seconds'
      : 'Local VLM — usually 5–20 seconds',
  );

  try {
    const r = await apiFetch(isVideo ? '/api/titler/run-video' : '/api/titler/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(
        isVideo ? { video_id: state.selected.id } : { image_id: state.selected.id }
      ),
    });
    const data = await r.json();
    onTitlesReceived(data.titles || []);
  } catch (e) {
    hideProgress();
    ArtRium.toast('Titler failed: ' + e.message, true);
  }
};

const onTitlesReceived = (titles) => {
  hideProgress();
  state.titles = titles;

  if (state.titles.length === 0) {
    ArtRium.toast('No titles returned from the model.', true);
    return;
  }

  renderTitleCards();
  $('titles-section').style.display = 'block';

  setTimeout(() => {
    $('titles-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
};

const renderTitleCards = () => {
  const list = $('titles-list');
  list.innerHTML = '';

  state.titles.forEach((title, i) => {
    const card = document.createElement('div');
    card.className = 'title-card';
    card.dataset.i = i;

    const text = document.createElement('div');
    text.className = 'title-card-text';
    text.textContent = title;

    card.appendChild(text);
    card.onclick = () => selectTitle(i);
    list.appendChild(card);
  });
};

const selectTitle = (i) => {
  document.querySelectorAll('.title-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.title-card[data-i="${i}"]`).classList.add('selected');

  state.chosenTitle = state.titles[i];
  $('save-btn').textContent = 'Save Title';
  $('save-btn').disabled = false;
};

// ══════════════════════════════════════════════════════════
// SAVE
// ══════════════════════════════════════════════════════════
const saveTitle = async () => {
  if (!state.chosenTitle || !state.selected) return;

  const btn = $('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const isVideo = state.mode === 'video';
  const url = isVideo
    ? `/api/video/jobs/${state.selected.id}`
    : `/api/images/${state.selected.id}`;

  try {
    const r = await apiFetch(url, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: state.chosenTitle }),
    });
    const updated = await r.json();
    state.selected.title = updated.title;

    const currentEl = $('preview-current');
    currentEl.textContent = updated.title;
    currentEl.classList.remove('placeholder');

    btn.textContent = 'Saved ✓';
    ArtRium.toast('Title saved');
    setTimeout(() => { btn.textContent = 'Save Title'; btn.disabled = false; }, 2000);
  } catch (e) {
    ArtRium.toast('Save failed: ' + e.message, true);
    btn.disabled = false;
    btn.textContent = 'Save Title';
  }
};

// ══════════════════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════════════════
const showProgress = (label, sub) => {
  $('prog-label').textContent = label;
  $('prog-sub').textContent = sub;
  $('progress-block').classList.add('show');
};

const hideProgress = () => {
  $('progress-block').classList.remove('show');
};

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  loadImages(true);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
});
</script>
</body>
</html>
