<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Titler">
  <title>Image Titler — art-rium</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg:         #111111;
      --surface:    #1c1c1e;
      --surface2:   #2c2c2e;
      --accent:     #f5a623;
      --accent-tap: #d4901e;
      --text:       #f2f2f7;
      --text-dim:   #8e8e93;
      --border:     #3a3a3c;
      --green:      #32d74b;
      --red:        #ff453a;
      --radius:     14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
      padding-top: env(safe-area-inset-top);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      font-size: 22px; color: var(--accent);
      background: none; border: none; cursor: pointer;
      padding: 0 4px 0 0; text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    header h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; flex: 1; }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); flex-shrink: 0; transition: background 0.3s;
    }
    .dot.connected  { background: var(--green); }
    .dot.connecting { background: var(--accent); animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ══════════════ VIEWS ══════════════ */
    .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    /* ══════════════ PICKER VIEW ══════════════ */
    .picker-hint {
      padding: 10px 16px 8px;
      font-size: 13px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .picker-grid-wrap {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 12px 0;
    }

    .picker-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .picker-item {
      position: relative;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface2);
      aspect-ratio: 1;
      border: 2.5px solid transparent;
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .picker-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .picker-item.selected { border-color: var(--accent); }
    .picker-item .check {
      position: absolute; top: 5px; right: 5px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #000;
      font-size: 13px; font-weight: 700;
      display: none; align-items: center; justify-content: center;
    }
    .picker-item.selected .check { display: flex; }

    .picker-load-more {
      padding: 14px 0 calc(env(safe-area-inset-bottom) + 16px);
      display: flex; justify-content: center;
    }

    /* ── Sticky bottom bar ── */
    .picker-bar {
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex; gap: 10px; align-items: center;
    }

    .selected-thumb {
      width: 44px; height: 44px;
      border-radius: 8px; object-fit: cover;
      display: none; flex-shrink: 0;
      border: 2px solid var(--accent);
    }
    .selected-thumb.show { display: block; }

    .generate-btn {
      flex: 1;
      background: var(--accent); color: #000;
      font-size: 16px; font-weight: 700;
      padding: 13px;
      border: none; border-radius: var(--radius);
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .generate-btn:disabled { opacity: 0.35; cursor: default; }
    .generate-btn:active:not(:disabled) { background: var(--accent-tap); }

    /* ══════════════ RESULTS VIEW ══════════════ */
    .results-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px 0;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Selected image card ── */
    .img-preview-row {
      display: flex; align-items: center; gap: 12px;
    }

    .img-preview-thumb {
      width: 72px; height: 72px;
      border-radius: 10px; object-fit: cover;
      flex-shrink: 0;
    }

    .img-preview-info { flex: 1; min-width: 0; }
    .img-preview-title {
      font-size: 13px; font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .img-preview-current {
      font-size: 15px; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .img-preview-current.placeholder { color: var(--text-dim); font-weight: 400; font-style: italic; }

    .change-btn {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text-dim);
      font-size: 13px; padding: 7px 12px;
      cursor: pointer; font-family: inherit;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .change-btn:active { background: var(--surface); }

    /* ── Progress ── */
    #progress-block {
      display: none;
      flex-direction: column; gap: 10px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
    }
    #progress-block.show { display: flex; }

    .prog-label { font-size: 14px; font-weight: 600; }
    .prog-sub   { font-size: 12px; color: var(--text-dim); }

    .prog-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .prog-bar-inner {
      height: 100%; background: var(--accent); border-radius: 2px;
      width: 0%; transition: width 0.35s ease;
    }
    /* Indeterminate animation for Ollama (no step progress) */
    .prog-bar-inner.indeterminate {
      width: 100%;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 40%, var(--accent) 60%, transparent 100%);
      background-size: 200% 100%;
      animation: slide 1.6s linear infinite;
    }
    @keyframes slide { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Title cards ── */
    .titles-section-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.7px;
    }

    .titles-list { display: flex; flex-direction: column; gap: 8px; }

    .title-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .title-card:active { background: var(--surface2); }
    .title-card.selected {
      border-color: var(--accent);
      background: rgba(245, 166, 35, 0.07);
    }

    .title-card-text {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
    }

    /* ── Save bar ── */
    .results-bar {
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .save-btn {
      width: 100%;
      background: var(--accent); color: #000;
      font-size: 16px; font-weight: 700;
      padding: 14px;
      border: none; border-radius: var(--radius);
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn:disabled { opacity: 0.35; cursor: default; }
    .save-btn:active:not(:disabled) { background: var(--accent-tap); }

    /* ── Toast ── */
    #toast {
      position: fixed; left: 16px; right: 16px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      max-width: 560px; margin: 0 auto;
      background: var(--surface2); color: var(--text); font-size: 14px;
      padding: 12px 16px; border-radius: var(--radius);
      transform: translateY(120px); opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 999; pointer-events: none; text-align: center;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--red); }

    /* ── Load more in picker ── */
    .load-more-btn {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 14px; font-weight: 600;
      padding: 11px 24px; cursor: pointer; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .load-more-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
<div class="app">

  <header>
    <a class="back-btn" href="/" title="Dashboard">‹</a>
    <h1>Image Titler</h1>
    <div class="dot connecting" id="dot"></div>
  </header>

  <!-- ══ VIEW: PICKER ══ -->
  <div class="view active" id="view-picker">

    <p class="picker-hint">Select an image to generate titles for.</p>

    <div class="picker-grid-wrap">
      <div class="picker-grid" id="picker-grid"></div>
      <div class="picker-load-more" id="picker-footer" style="display:none">
        <button class="load-more-btn" id="picker-load-more" onclick="loadMoreImages()">Load more</button>
      </div>
    </div>

    <div class="picker-bar">
      <img class="selected-thumb" id="selected-thumb" src="" alt="">
      <button class="generate-btn" id="generate-btn" disabled onclick="startTitling()">
        Select an image first
      </button>
    </div>

  </div>

  <!-- ══ VIEW: RESULTS ══ -->
  <div class="view" id="view-results">

    <div class="results-scroll" id="results-scroll">

      <!-- Image row -->
      <div class="img-preview-row">
        <img class="img-preview-thumb" id="preview-thumb" src="" alt="">
        <div class="img-preview-info">
          <div class="img-preview-title">Current title</div>
          <div class="img-preview-current placeholder" id="preview-current">None</div>
        </div>
        <button class="change-btn" onclick="switchView('picker')">Change</button>
      </div>

      <!-- Progress -->
      <div id="progress-block">
        <div class="prog-label" id="prog-label">Sending to Ollama…</div>
        <div class="prog-sub" id="prog-sub">This may take 30–60 seconds</div>
        <div class="prog-track"><div class="prog-bar-inner indeterminate" id="prog-bar"></div></div>
      </div>

      <!-- Titles -->
      <div id="titles-section" style="display:none">
        <div class="titles-section-label" style="margin-bottom:10px">Generated Titles</div>
        <div class="titles-list" id="titles-list"></div>
      </div>

    </div>

    <div class="results-bar">
      <button class="save-btn" id="save-btn" disabled onclick="saveTitle()">
        Select a title to save
      </button>
    </div>

  </div>

</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════════════════════════════
const PAGE_SIZE = 60;

const state = {
  apiKey:   localStorage.getItem('z_apikey') || '',
  clientId: (() => {
    let id = localStorage.getItem('z_client_id');
    if (!id) { id = crypto.randomUUID(); localStorage.setItem('z_client_id', id); }
    return id;
  })(),
  ws:        null,
  wsReady:   false,
  images:    [],
  offset:    0,
  hasMore:   false,
  selected:  null,   // full image record
  titles:    [],
  chosenTitle: null,
};

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);

let toastTimer;
const toast = (msg, isError = false) => {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
};

const getAuthHeaders = () => state.apiKey ? { 'X-API-Key': state.apiKey } : {};

const withAuth = url =>
  state.apiKey ? url + (url.includes('?') ? '&' : '?') + 'api_key=' + encodeURIComponent(state.apiKey) : url;

const apiFetch = async (url, opts = {}) => {
  const r = await fetch(url, { ...opts, headers: { ...getAuthHeaders(), ...opts.headers } });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.detail || `Error ${r.status}`);
  }
  return r;
};

// ══════════════════════════════════════════════════════════
// VIEW SWITCHING
// ══════════════════════════════════════════════════════════
const switchView = (name) => {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  $('view-' + name).classList.add('active');
};

// ══════════════════════════════════════════════════════════
// IMAGE PICKER
// ══════════════════════════════════════════════════════════
const loadImages = async (reset = false) => {
  if (reset) {
    state.images = [];
    state.offset = 0;
    $('picker-grid').innerHTML = '';
    $('picker-footer').style.display = 'none';
  }

  try {
    const r = await apiFetch(`/api/images?limit=${PAGE_SIZE}&offset=${state.offset}`);
    const data = await r.json();

    state.images.push(...data);
    state.offset += data.length;
    state.hasMore = data.length === PAGE_SIZE;

    data.forEach((img, i) => {
      const globalIdx = state.images.length - data.length + i;
      $('picker-grid').appendChild(makePickerItem(img, globalIdx));
    });

    $('picker-footer').style.display = state.hasMore ? 'flex' : 'none';
    $('picker-load-more').disabled = false;
  } catch (e) {
    toast('Failed to load images: ' + e.message, true);
  }
};

const makePickerItem = (img, idx) => {
  const div = document.createElement('div');
  div.className = 'picker-item';
  div.dataset.idx = idx;

  const image = document.createElement('img');
  image.src = withAuth(img.url);
  image.loading = 'lazy';
  image.alt = img.filename;

  const check = document.createElement('div');
  check.className = 'check';
  check.textContent = '✓';

  div.appendChild(image);
  div.appendChild(check);
  div.onclick = () => selectImage(idx);
  return div;
};

const selectImage = (idx) => {
  // Deselect previous
  document.querySelectorAll('.picker-item.selected').forEach(el => el.classList.remove('selected'));

  const img = state.images[idx];
  state.selected = img;

  document.querySelector(`.picker-item[data-idx="${idx}"]`).classList.add('selected');

  // Update bottom bar
  const thumb = $('selected-thumb');
  thumb.src = withAuth(img.url);
  thumb.classList.add('show');

  const btn = $('generate-btn');
  btn.textContent = 'Generate Titles →';
  btn.disabled = false;
};

const loadMoreImages = () => {
  $('picker-load-more').disabled = true;
  loadImages(false);
};

// ══════════════════════════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════════════════════════
const setDot = (status) => {
  $('dot').className = 'dot ' + status;
};

const connectWs = () => {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const key = state.apiKey ? `?api_key=${encodeURIComponent(state.apiKey)}` : '';
  state.ws = new WebSocket(`${proto}//${location.host}/ws/${state.clientId}${key}`);
  setDot('connecting');

  state.ws.onopen  = () => { state.wsReady = true;  setDot('connected'); };
  state.ws.onerror = () => state.ws.close();
  state.ws.onclose = (e) => {
    state.wsReady = false;
    setDot('disconnected');
    if (e.code !== 4001) setTimeout(connectWs, 3500);
  };
  state.ws.onmessage = (e) => {
    try { handleWsMsg(JSON.parse(e.data)); } catch (_) {}
  };
};

// ══════════════════════════════════════════════════════════
// WS MESSAGE HANDLING
// ══════════════════════════════════════════════════════════
const handleWsMsg = (msg) => {
  if (msg.type === 'text_ready') {
    onTitlesReceived(msg.data.text);
    return;
  }

  if (msg.type === 'execution_error') {
    hideProgress();
    toast('Ollama workflow failed: ' + (msg.data?.message || 'unknown error'), true);
    return;
  }

  // Show progress for known executing nodes
  if (msg.type === 'executing' && msg.data?.node) {
    const nodeLabels = {
      '12': 'Loading image…',
      '11': 'Resizing image…',
      '7':  'Connecting to Ollama…',
      '1':  'Generating titles…',
    };
    const label = nodeLabels[msg.data.node];
    if (label) $('prog-label').textContent = label;
  }
};

// ══════════════════════════════════════════════════════════
// TITLING FLOW
// ══════════════════════════════════════════════════════════
const startTitling = async () => {
  if (!state.selected) return;
  if (!state.wsReady) { toast('Not connected — please wait.'); return; }

  // Switch to results view
  switchView('results');

  // Update preview row
  $('preview-thumb').src = withAuth(state.selected.url);
  const currentEl = $('preview-current');
  if (state.selected.title) {
    currentEl.textContent = state.selected.title;
    currentEl.classList.remove('placeholder');
  } else {
    currentEl.textContent = 'None';
    currentEl.classList.add('placeholder');
  }

  // Reset results
  $('titles-section').style.display = 'none';
  $('titles-list').innerHTML = '';
  state.titles = [];
  state.chosenTitle = null;
  $('save-btn').disabled = true;
  $('save-btn').textContent = 'Select a title to save';

  // Show progress
  showProgress('Sending to Ollama…', 'This may take 30–60 seconds');

  try {
    await apiFetch('/api/titler/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_id: state.selected.id, client_id: state.clientId }),
    });
  } catch (e) {
    hideProgress();
    toast('Failed to start: ' + e.message, true);
  }
};

// ══════════════════════════════════════════════════════════
// TITLE DISPLAY & PARSING
// ══════════════════════════════════════════════════════════
const parseTitles = (text) => {
  // Strip <think>...</think> blocks (just in case)
  const clean = text.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();

  const titles = [];
  for (const line of clean.split('\n')) {
    // Match "1. Title", "1) Title", "- Title", "* Title"
    const m = line.match(/^(?:\d+[.)]\s+|[-*]\s+)\*{0,2}(.+?)\*{0,2}\s*$/);
    if (m) titles.push(m[1].trim());
  }
  // Fallback: non-empty lines that look like titles (≤10 words, no punctuation-only lines)
  if (titles.length === 0) {
    for (const line of clean.split('\n')) {
      const t = line.replace(/^\s*[-*\d.)]+\s*/, '').replace(/\*\*/g, '').trim();
      if (t && t.split(' ').length <= 12 && t.length > 3) titles.push(t);
    }
  }
  return [...new Set(titles)];  // dedupe
};

const onTitlesReceived = (text) => {
  hideProgress();
  state.titles = parseTitles(text);

  if (state.titles.length === 0) {
    toast('Could not parse titles from response. Raw output logged to console.');
    console.log('Raw LLM output:', text);
    return;
  }

  renderTitleCards();
  $('titles-section').style.display = 'block';

  // Scroll to titles
  setTimeout(() => {
    $('titles-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
};

const renderTitleCards = () => {
  const list = $('titles-list');
  list.innerHTML = '';

  state.titles.forEach((title, i) => {
    const card = document.createElement('div');
    card.className = 'title-card';
    card.dataset.i = i;

    const text = document.createElement('div');
    text.className = 'title-card-text';
    text.textContent = title;

    card.appendChild(text);
    card.onclick = () => selectTitle(i);
    list.appendChild(card);
  });
};

const selectTitle = (i) => {
  document.querySelectorAll('.title-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.title-card[data-i="${i}"]`).classList.add('selected');

  state.chosenTitle = state.titles[i];
  $('save-btn').textContent = 'Save Title';
  $('save-btn').disabled = false;
};

// ══════════════════════════════════════════════════════════
// SAVE
// ══════════════════════════════════════════════════════════
const saveTitle = async () => {
  if (!state.chosenTitle || !state.selected) return;

  const btn = $('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const r = await apiFetch(`/api/images/${state.selected.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: state.chosenTitle }),
    });
    const updated = await r.json();
    state.selected.title = updated.title;

    // Update preview
    const currentEl = $('preview-current');
    currentEl.textContent = updated.title;
    currentEl.classList.remove('placeholder');

    btn.textContent = 'Saved ✓';
    toast('Title saved');
    setTimeout(() => { btn.textContent = 'Save Title'; btn.disabled = false; }, 2000);
  } catch (e) {
    toast('Save failed: ' + e.message, true);
    btn.disabled = false;
    btn.textContent = 'Save Title';
  }
};

// ══════════════════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════════════════
const showProgress = (label, sub) => {
  $('prog-label').textContent = label;
  $('prog-sub').textContent = sub;
  $('progress-block').classList.add('show');
};

const hideProgress = () => {
  $('progress-block').classList.remove('show');
};

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  loadImages(true);
  connectWs();
