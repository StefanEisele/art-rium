<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <title>Video — art-rium</title>
  <link rel="stylesheet" href="/shared/shared.css">
  <style>
    .app { display: flex; flex-direction: column; height: 100dvh; max-width: 680px; margin: 0 auto; padding-top: env(safe-area-inset-top); }
    header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .back-btn { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; padding: 0 4px 0 0; }
    header h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; flex: 1; }
    main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── Form panel ── */
    #form-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .card h2 { font-size: 15px; font-weight: 700; }

    /* Mode chips */
    .mode-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .mode-chip { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; font-family: inherit; transition: all 0.13s; }
    .mode-chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

    /* Images strip */
    .images-strip { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; min-height: 72px; }
    .images-strip::-webkit-scrollbar { display: none; }
    .sel-wrap { position: relative; flex-shrink: 0; width: 72px; height: 72px; }
    .sel-wrap img { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; display: block; }
    .sel-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--red); color: #fff; border: none; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .sel-order { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.65); color: #fff; font-size: 10px; font-weight: 700; border-radius: 4px; padding: 1px 5px; }
    .add-btn { flex-shrink: 0; width: 72px; height: 72px; border-radius: 10px; border: 1.5px dashed var(--border); background: var(--surface2); color: var(--text-dim); font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* Settings rows */
    .field-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .field-label { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; min-width: 80px; }
    .field-select, .field-input {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; font-weight: 600;
      padding: 6px 10px; outline: none; font-family: inherit;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .field-select:focus, .field-input:focus { border-color: var(--accent); }
    .field-input { width: 80px; text-align: center; }

    /* Resolution chips */
    .res-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .res-chip { font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; font-family: inherit; transition: all 0.13s; }
    .res-chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

    /* Shared prompt (flf2v) */
    textarea#prompt-input { width: 100%; box-sizing: border-box; resize: none; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 12px; outline: none; font-family: inherit; line-height: 1.5; transition: border-color 0.2s; min-height: 60px; }
    textarea#prompt-input:focus { border-color: var(--accent); }
    textarea#prompt-input::placeholder { color: var(--text-dim); }

    /* Per-image section (i2v_multi) */
    .per-img-section { display: flex; flex-direction: column; gap: 10px; }
    .per-img-row { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .per-img-header { display: flex; align-items: center; gap: 10px; }
    .per-img-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .per-img-num { font-size: 13px; font-weight: 700; }
    .per-img-prompt { width: 100%; box-sizing: border-box; resize: none; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 8px 10px; outline: none; font-family: inherit; line-height: 1.5; transition: border-color 0.2s; min-height: 52px; }
    .per-img-prompt:focus { border-color: var(--accent); }
    .per-img-prompt::placeholder { color: var(--text-dim); }
    .per-img-frames-row { display: flex; align-items: center; gap: 10px; }

    /* Generate button */
    .gen-btn { width: 100%; padding: 14px; border-radius: var(--radius-pill); border: none; background: var(--accent); color: var(--on-accent); font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.13s; }
    .gen-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Video list ── */
    #videos-section { padding: 16px; }
    .section-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    .video-empty { text-align: center; padding: 32px 0; color: var(--text-dim); font-size: 14px; }

    .video-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
    .video-header { display: flex; justify-content: space-between; align-items: center; }
    .video-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 8px; flex-wrap: wrap; }
    .video-meta strong { color: var(--text); font-weight: 600; }
    .status-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 5px; }
    .status-generating { background: var(--accent-2-soft); color: var(--accent-2); }
    .status-assembling { background: var(--accent-2-soft); color: var(--accent-2); }
    .status-review     { background: rgba(255,159,10,0.15); color: #ff9f0a; }
    .status-done       { background: rgba(50,215,75,0.15);  color: var(--green); }
    .status-failed     { background: rgba(255,69,58,0.15);  color: var(--red); }

    /* ── Segment review (Stapel) ── */
    .seg-review { display: flex; flex-direction: column; gap: 8px; }
    .seg-hint { font-size: 12px; color: var(--text-dim); }
    .seg-row {
      display: flex; gap: 10px; align-items: stretch;
      background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .seg-row.selected { border-color: var(--accent); background: var(--accent-soft); }
    .seg-thumb-wrap { position: relative; flex-shrink: 0; width: 96px; height: 96px; border-radius: 8px; overflow: hidden; background: #000; }
    .seg-thumb-wrap img, .seg-thumb-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .seg-thumb-wrap video { display: none; }
    .seg-thumb-wrap.playing img { display: none; }
    .seg-thumb-wrap.playing video { display: block; }
    .seg-play-icon {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.25); font-size: 22px; color: rgba(255,255,255,0.92);
      pointer-events: none;
    }
    .seg-thumb-wrap.playing .seg-play-icon { display: none; }
    .seg-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
    .seg-title { font-size: 13px; font-weight: 700; }
    .seg-meta { font-size: 11px; color: var(--text-dim); }
    .seg-prompt { font-size: 12px; color: var(--text); opacity: 0.85; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .seg-check {
      flex-shrink: 0; align-self: center;
      width: 24px; height: 24px; border-radius: 6px;
      border: 1.5px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: transparent;
    }
    .seg-row.selected .seg-check { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .seg-assemble-btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      background: var(--accent); color: var(--on-accent); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: opacity 0.15s;
    }
    .seg-assemble-btn:disabled { opacity: 0.4; cursor: default; }

    /* Thumbnail + video preview */
    .video-preview-wrap { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
    .video-thumb { width: 100%; max-height: 280px; object-fit: contain; display: block; border-radius: 10px; }
    .thumb-play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); cursor: pointer; border-radius: 10px; transition: background 0.15s; }
    .thumb-play-overlay:hover { background: rgba(0,0,0,0.15); }
    .play-icon { width: 52px; height: 52px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    video.preview { width: 100%; border-radius: 10px; max-height: 320px; background: #000; display: none; }
    video.preview.visible { display: block; }

    .error-text { font-size: 12px; color: var(--red); word-break: break-all; }

    /* ── Progress bar ── */
    .progress-wrap { display: flex; flex-direction: column; gap: 10px; }
    .progress-track { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), #7dd3fc);
      transition: width 0.6s ease;
    }
    .progress-message { font-size: 13px; color: var(--text); font-weight: 600; }
    .progress-pct { font-size: 11px; color: var(--text-dim); font-weight: 600; margin-left: 6px; }

    /* Step indicator pills */
    .progress-steps {
      display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto;
      scrollbar-width: none;
    }
    .progress-steps::-webkit-scrollbar { display: none; }
    .step-pill {
      flex: 1 1 0; min-width: 0;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
      padding: 5px 6px; border-radius: 5px;
      background: var(--surface2); color: var(--text-dim);
      border: 1.5px solid var(--border);
      text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: all 0.2s;
    }
    .step-pill.done {
      background: rgba(50,215,75,0.12); color: var(--green); border-color: rgba(50,215,75,0.25);
    }
    .step-pill.active {
      background: var(--accent); color: var(--on-accent); border-color: var(--accent);
      animation: step-pulse 1.4s ease-in-out infinite;
    }
    @keyframes step-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }

    .video-actions { display: flex; gap: 8px; }

    /* Inline title + notes editor on each video card */
    .video-meta-edit { display: flex; flex-direction: column; gap: 6px; }
    .video-title-input {
      width: 100%; box-sizing: border-box;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 15px; font-weight: 700; letter-spacing: -0.2px;
      padding: 8px 10px; outline: none; font-family: inherit;
      transition: border-color 0.2s;
    }
    .video-title-input:focus { border-color: var(--accent); }
    .video-title-input.dirty { border-color: var(--accent); }
    .video-title-input::placeholder { color: var(--text-dim); font-weight: 600; font-style: italic; }

    .video-notes-input {
      width: 100%; box-sizing: border-box; resize: vertical;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 13px; line-height: 1.45;
      padding: 8px 10px; outline: none; font-family: inherit;
      transition: border-color 0.2s; min-height: 40px;
    }
    .video-notes-input:focus { border-color: var(--accent); }
    .video-notes-input.dirty { border-color: var(--accent); }
    .video-notes-input::placeholder { color: var(--text-dim); font-style: italic; }

    .save-indicator { font-size: 10px; color: var(--text-dim); padding: 0 2px; min-height: 12px; }
    .save-indicator.saved { color: #6abe6a; }
    .save-indicator.error { color: var(--red); }
    .action-btn { flex: 1; padding: 9px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; text-align: center; text-decoration: none; }
    .action-btn.delete { background: rgba(255,69,58,0.08); color: var(--red); border-color: rgba(255,69,58,0.2); }

    /* ── Soundtrack chip on each card ── */
    .soundtrack-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
    }
    .soundtrack-chip .label { color: var(--text-dim); font-size: 11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; }
    .soundtrack-chip .name { color: var(--text); font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .soundtrack-chip .glyph { color: var(--accent); font-size: 16px; }
    .soundtrack-chip .chip-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); border-radius: 6px; padding: 3px 8px;
      font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .soundtrack-chip .chip-btn:hover { color: var(--accent); border-color: var(--accent); }
    .soundtrack-chip .chip-btn.add { color: var(--accent); border-color: rgba(224,122,58,0.35); background: rgba(224,122,58,0.06); flex: 1; }
    .soundtrack-chip .chip-btn.remove { color: var(--red); border-color: rgba(255,69,58,0.25); }
    .soundtrack-chip.muxing .label,
    .soundtrack-chip.muxing .glyph { animation: step-pulse 1.4s ease-in-out infinite; }
    .soundtrack-badge {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.62); color: #fff;
      border-radius: 4px; padding: 1px 7px; font-size: 13px;
      pointer-events: none;
    }

    /* ── Song picker modal (vertical list, audio previews) ── */
    #song-picker-modal { display: none; position: fixed; inset: 0; z-index: 101; background: var(--bg); flex-direction: column; padding-top: env(safe-area-inset-top); }
    #song-picker-modal.show { display: flex; }
    #song-list { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .song-row {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .song-row .row-head { display: flex; align-items: baseline; gap: 10px; }
    .song-row .row-head .title { flex: 1; min-width: 0; font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-row .row-head .meta { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    .song-row .tags { font-size: 11px; color: var(--text-dim); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .song-row audio { width: 100%; height: 32px; }
    .song-row .use-btn { align-self: flex-end; padding: 6px 12px; background: var(--accent); color: var(--on-accent); border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .song-row .use-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Picker modal ── */
    #picker-modal { display: none; position: fixed; inset: 0; z-index: 100; background: var(--bg); flex-direction: column; padding-top: env(safe-area-inset-top); }
    #picker-modal.show { display: flex; }
    .picker-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .picker-header h2 { font-size: 17px; font-weight: 700; flex: 1; }
    .picker-done-btn { background: var(--accent); border: none; color: var(--on-accent); font-size: 14px; font-weight: 700; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .picker-search { padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #picker-search { width: 100%; background: var(--surface2); border: 1.5px solid transparent; border-radius: 10px; color: var(--text); font-size: 15px; padding: 9px 14px; outline: none; font-family: inherit; }
    #picker-search:focus { border-color: var(--accent); }
    #picker-grid { flex: 1; min-height: 0; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 3px; }
    .picker-cell { position: relative; height: 0; padding-bottom: 100%; cursor: pointer; overflow: hidden; border-radius: 4px; background: var(--surface2); }
    .picker-cell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
    .sel-overlay { position: absolute; inset: 0; background: rgba(224,122,58,0.35); display: none; align-items: center; justify-content: center; font-size: 28px; color: #fff; }
    .picker-cell.selected .sel-overlay { display: flex; }
    .picker-cell.selected { outline: 3px solid var(--accent); outline-offset: -3px; }
    .order-badge { position: absolute; top: 5px; left: 5px; background: var(--accent); color: var(--on-accent); font-size: 11px; font-weight: 700; border-radius: 50%; width: 20px; height: 20px; display: none; align-items: center; justify-content: center; }
    .picker-cell.selected .order-badge { display: flex; }
    .picker-count { background: var(--accent); color: var(--on-accent); font-size: 12px; font-weight: 700; border-radius: 10px; padding: 2px 8px; display: none; }
    .picker-count.show { display: inline-block; }

    #toast { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 90px); left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: rgba(255,69,58,0.2); color: var(--red); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <button class="back-btn" onclick="history.back()">‹</button>
    <h1>Video Generator</h1>
  </header>

  <main>
    <!-- Form -->
    <div id="form-section">
      <div class="card">
        <h2>New Video</h2>

        <!-- Mode selector -->
        <div class="field-row">
          <span class="field-label">Mode</span>
          <div class="mode-chips" id="mode-chips">
            <button class="mode-chip active" data-mode="i2v_multi" onclick="setMode('i2v_multi',this)">Animate (i2v)</button>
            <button class="mode-chip" data-mode="flf2v" onclick="setMode('flf2v',this)">Transitions (FLF2V)</button>
          </div>
        </div>

        <!-- Image picker strip -->
        <div>
          <div class="images-strip" id="images-strip">
            <button class="add-btn" id="add-btn" onclick="openPicker()">+</button>
          </div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:6px" id="img-hint"></div>
        </div>

        <!-- Resolution -->
        <div class="field-row">
          <span class="field-label">Resolution</span>
          <div class="res-chips" id="res-chips">
            <button class="res-chip active" data-w="960" data-h="960" onclick="setRes(960,960,this)">960×960</button>
            <button class="res-chip" data-w="1280" data-h="704" onclick="setRes(1280,704,this)">1280×704</button>
            <button class="res-chip" data-w="704" data-h="1280" onclick="setRes(704,1280,this)">704×1280</button>
          </div>
        </div>

        <!-- FPS -->
        <div class="field-row">
          <span class="field-label">FPS</span>
          <select class="field-select" id="fps-select">
            <option value="16">16</option>
            <option value="24" selected>24</option>
            <option value="30">30</option>
          </select>
        </div>

        <!-- RIFE multiplier (i2v_multi only) -->
        <div class="field-row" id="rife-row">
          <span class="field-label">RIFE ×</span>
          <div class="res-chips" id="rife-chips">
            <button class="res-chip"        data-mult="2" onclick="setRife(2,this)">2×</button>
            <button class="res-chip active" data-mult="3" onclick="setRife(3,this)">3×</button>
            <button class="res-chip"        data-mult="4" onclick="setRife(4,this)">4×</button>
          </div>
          <span style="font-size:11px;color:var(--text-dim)">frame interpolation</span>
        </div>

        <!-- Pingpong (i2v_multi only) -->
        <div class="field-row" id="pingpong-row">
          <span class="field-label">Loop</span>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-dim);">
            <input type="checkbox" id="pingpong-toggle" onchange="state.pingpong = this.checked" style="width:16px;height:16px;accent-color:var(--accent);">
            Pingpong (boomerang)
          </label>
        </div>

        <!-- Per-image section (i2v_multi only) -->
        <div id="per-img-section" class="per-img-section" style="display:none"></div>

        <!-- Frames per transition (flf2v only) -->
        <div class="field-row" id="shared-frames-row" style="display:none">
          <span class="field-label">Frames</span>
          <input class="field-input" type="number" id="frame-count" value="25" min="5" max="81" step="1">
          <span style="font-size:13px;color:var(--text-dim)">per transition</span>
        </div>

        <!-- Shared prompt (flf2v only) -->
        <textarea id="prompt-input" rows="2" placeholder="Optional motion prompt (e.g. 'slow zoom in, cinematic')" style="display:none"></textarea>

        <button class="gen-btn" id="gen-btn" onclick="generate()" disabled>Generate Video</button>
      </div>
    </div>

    <!-- Video list -->
    <div id="videos-section">
      <div class="section-label">Generated Videos</div>
      <div id="videos-list">
        <div class="video-empty">No videos yet.</div>
      </div>
    </div>
  </main>
</div>

<!-- Picker -->
<div id="picker-modal">
  <div class="picker-header">
    <button class="back-btn" onclick="closePicker()">✕</button>
    <h2>Choose Images</h2>
    <span class="picker-count" id="picker-count">0</span>
    <button class="picker-done-btn" onclick="closePicker()">Done</button>
  </div>
  <div class="picker-search">
    <input type="search" id="picker-search" placeholder="Search images…" autocomplete="off">
  </div>
  <div id="picker-grid"></div>
</div>

<!-- Soundtrack picker -->
<div id="song-picker-modal">
  <div class="picker-header">
    <button class="back-btn" onclick="closeSongPicker()">✕</button>
    <h2>Choose Soundtrack</h2>
  </div>
  <div class="picker-search">
    <input type="search" id="song-picker-search" placeholder="Search title / tags…" autocomplete="off">
  </div>
  <div id="song-list"><div style="color:var(--text-dim);padding:20px;text-align:center">Loading…</div></div>
</div>

<div id="toast"></div>

<script src="/shared/shared.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  apiKey: ArtRium.getApiKey(),
  mode: 'i2v_multi',
  selectedImages: [],
  perImageSettings: new Map(),   // imageId → {prompt, frameCount}
  width: 960, height: 960,
  rifeMultiplier: 3,             // i2v_multi: RIFE VFI interpolation factor (2 | 3 | 4)
  pingpong: false,               // i2v_multi: VHS_VideoCombine pingpong flag
  pickerImages: [], pickerSearch: '', pickerPage: 0, pickerLoading: false, pickerDone: false,
  pickerSelection: new Map(),
  videos: [],
  progressIntervals: new Map(),
  segmentSelection: new Map(),   // videoId → Set<segmentIndex> for the review UI
};

const $ = id => document.getElementById(id);
const api = (url, opts={}) => ArtRium.apiFetch(url, opts, state.apiKey);
const withAuth = url => ArtRium.withAuth(url, state.apiKey);
const PICKER_LIMIT = 30;
const maxImagesForMode = () => state.mode === 'i2v_multi' ? 10 : 3;

// ── Mode ──────────────────────────────────────────────────────────────────────
function setMode(mode, el) {
  state.mode = mode;
  document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const maxN = maxImagesForMode();
  if (state.selectedImages.length > maxN) {
    state.selectedImages = state.selectedImages.slice(0, maxN);
    ArtRium.toast(`Trimmed to ${maxN} images for this mode`);
  }
  renderStrip();
  _updateModeFields();
}

function _updateModeFields() {
  const isI2v = state.mode === 'i2v_multi';
  $('shared-frames-row').style.display = isI2v ? 'none' : '';
  $('prompt-input').style.display      = isI2v ? 'none' : '';
  $('rife-row').style.display          = isI2v ? '' : 'none';
  $('pingpong-row').style.display      = isI2v ? '' : 'none';
}

function setRife(mult, el) {
  state.rifeMultiplier = mult;
  document.querySelectorAll('#rife-chips .res-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// ── Resolution ────────────────────────────────────────────────────────────────
function setRes(w, h, el) {
  state.width = w; state.height = h;
  document.querySelectorAll('.res-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// ── Strip rendering ───────────────────────────────────────────────────────────
function renderStrip() {
  const strip = $('images-strip');
  strip.querySelectorAll('.sel-wrap').forEach(el => el.remove());
  const addBtn = $('add-btn');
  state.selectedImages.forEach((img, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'sel-wrap';
    wrap.innerHTML = `<img src="${withAuth(img.thumb_url)}" alt=""><span class="sel-order">${idx+1}</span>
      <button class="sel-remove" onclick="removeImage(${idx})">×</button>`;
    strip.insertBefore(wrap, addBtn);
  });
  const n = state.selectedImages.length;
  const maxN = maxImagesForMode();
  addBtn.style.display = n >= maxN ? 'none' : '';
  const isI2v = state.mode === 'i2v_multi';
  if (isI2v) {
    $('img-hint').textContent = n === 0
      ? 'Select 1–10 images. Each gets its own animation clip — you pick which to merge.'
      : n === 1 ? '1 image — animated loop (skips review, single clip becomes the video).'
      : `${n} images — ${n} independent clips; pick which to merge after generation.`;
    $('gen-btn').disabled = n < 1;
  } else {
    $('img-hint').textContent = n === 0
      ? 'Select 2–3 key frames. The AI generates transitions between them.'
      : n < 2 ? `${n} selected — add at least one more.`
      : `${n} key frames · ${n-1} transition${n > 2 ? 's' : ''}.`;
    $('gen-btn').disabled = n < 2;
  }
  renderPerImageSection();
}

function removeImage(idx) {
  state.selectedImages.splice(idx, 1);
  renderStrip();
}

// ── Per-image section ─────────────────────────────────────────────────────────
function renderPerImageSection() {
  const sec = $('per-img-section');
  if (state.mode !== 'i2v_multi' || state.selectedImages.length === 0) {
    sec.style.display = 'none';
    return;
  }
  sec.style.display = '';

  // Snapshot current input values before clearing
  sec.querySelectorAll('.per-img-row').forEach(row => {
    const id = row.dataset.imgId;
    if (!id) return;
    state.perImageSettings.set(id, {
      prompt:     row.querySelector('.per-img-prompt')?.value || '',
      frameCount: parseInt(row.querySelector('.per-img-frames')?.value) || 25,
    });
  });

  sec.innerHTML = '';
  state.selectedImages.forEach((img, idx) => {
    const saved = state.perImageSettings.get(img.id) || {};
    const row = document.createElement('div');
    row.className = 'per-img-row';
    row.dataset.imgId = img.id;
    row.innerHTML = `
      <div class="per-img-header">
        <img class="per-img-thumb" src="${withAuth(img.thumb_url)}" alt="">
        <span class="per-img-num">Image ${idx + 1}</span>
      </div>
      <textarea class="per-img-prompt" rows="2" placeholder="Animation prompt for image ${idx + 1}…">${_esc(saved.prompt || '')}</textarea>
      <div class="per-img-frames-row">
        <span class="field-label">Frames</span>
        <input class="field-input per-img-frames" type="number" value="${saved.frameCount || 25}" min="5" max="81" step="1">
      </div>
    `;
    sec.appendChild(row);
  });
}

function _esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Image picker ──────────────────────────────────────────────────────────────
function openPicker() {
  state.pickerSelection = new Map(state.selectedImages.map((img, i) => [img.id, i + 1]));
  $('picker-modal').classList.add('show');
  if (!state.pickerImages.length) loadPickerImages(true);
  else refreshPickerCells();
  updatePickerCount();
}

function closePicker() {
  $('picker-modal').classList.remove('show');
  const ordered = [...state.pickerSelection.entries()].sort((a,b)=>a[1]-b[1]).map(([id])=>state.pickerImages.find(img=>img.id===id)).filter(Boolean);
  const inGrid = new Set(state.pickerImages.map(i=>i.id));
  const preserved = state.selectedImages.filter(img=>!inGrid.has(img.id));
  state.selectedImages = [...ordered, ...preserved];
  renderStrip();
}

async function loadPickerImages(reset=false) {
  if (state.pickerLoading) return;
  if (!reset && state.pickerDone) return;
  if (reset) { state.pickerImages=[]; state.pickerPage=0; state.pickerDone=false; $('picker-grid').innerHTML=''; }
  state.pickerLoading = true;
  const offset = state.pickerPage * PICKER_LIMIT;
  const search = state.pickerSearch ? `&search=${encodeURIComponent(state.pickerSearch)}` : '';
  try {
    const r = await api(`/api/images?limit=${PICKER_LIMIT}&offset=${offset}${search}`);
    const imgs = await r.json();
    if (imgs.length < PICKER_LIMIT) state.pickerDone = true;
    state.pickerPage++;
    state.pickerImages.push(...imgs);
    appendPickerCells(imgs);
  } catch(e) { ArtRium.toast('Failed to load images', true); }
  finally { state.pickerLoading = false; }
}

function appendPickerCells(imgs) {
  const grid = $('picker-grid');
  for (const img of imgs) {
    const cell = document.createElement('div');
    cell.className = 'picker-cell';
    cell.dataset.id = img.id;
    const order = state.pickerSelection.get(img.id);
    if (order !== undefined) cell.classList.add('selected');
    cell.innerHTML = `<img src="${withAuth(img.thumb_url)}" alt=""><div class="sel-overlay">✓</div><div class="order-badge">${order||''}</div>`;
    cell.onclick = () => toggleCell(cell, img);
    grid.appendChild(cell);
  }
}

function toggleCell(cell, img) {
  if (state.pickerSelection.has(img.id)) {
    state.pickerSelection.delete(img.id);
    const sorted = [...state.pickerSelection.entries()].sort((a,b)=>a[1]-b[1]);
    state.pickerSelection = new Map(sorted.map(([id],i)=>[id,i+1]));
  } else {
    const maxN = maxImagesForMode();
    if (state.pickerSelection.size >= maxN) { ArtRium.toast(`Maximum ${maxN} images`, true); return; }
    state.pickerSelection.set(img.id, state.pickerSelection.size + 1);
  }
  refreshPickerCells();
  updatePickerCount();
}

function refreshPickerCells() {
  $('picker-grid').querySelectorAll('.picker-cell').forEach(cell => {
    const order = state.pickerSelection.get(cell.dataset.id);
    cell.classList.toggle('selected', order !== undefined);
    const badge = cell.querySelector('.order-badge');
    if (badge) badge.textContent = order !== undefined ? order : '';
  });
}

function updatePickerCount() {
  const n = state.pickerSelection.size;
  const el = $('picker-count');
  el.textContent = n;
  el.classList.toggle('show', n > 0);
}

let _searchTimer;
$('picker-search').addEventListener('input', e => {
  clearTimeout(_searchTimer);
  state.pickerSearch = e.target.value;
  _searchTimer = setTimeout(() => loadPickerImages(true), 350);
});
$('picker-grid').addEventListener('scroll', () => {
  const el = $('picker-grid');
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - 80) loadPickerImages(false);
});

// ── Generate ──────────────────────────────────────────────────────────────────
async function generate() {
  const n = state.selectedImages.length;
  if (n < 1) return;
  if (state.mode === 'flf2v' && n < 2) return;
  const btn = $('gen-btn');
  btn.disabled = true; btn.textContent = 'Queuing…';
  try {
    let body;
    if (state.mode === 'i2v_multi') {
      const rows = Array.from($('per-img-section').querySelectorAll('.per-img-row'));
      body = {
        image_ids:       state.selectedImages.map(i => i.id),
        workflow:        'i2v_multi',
        width:           state.width,
        height:          state.height,
        fps:             parseInt($('fps-select').value) || 24,
        frame_count:     25,
        prompts:         rows.map(r => r.querySelector('.per-img-prompt').value.trim()),
        frame_counts:    rows.map(r => parseInt(r.querySelector('.per-img-frames').value) || 25),
        rife_multiplier: state.rifeMultiplier,
        pingpong:        state.pingpong,
      };
    } else {
      body = {
        image_ids:   state.selectedImages.map(i => i.id),
        workflow:    'flf2v',
        width:       state.width,
        height:      state.height,
        fps:         parseInt($('fps-select').value) || 24,
        frame_count: parseInt($('frame-count').value) || 25,
        prompt:      $('prompt-input').value.trim(),
      };
    }
    const r = await api('/api/video/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const d = await r.json();
    ArtRium.toast('Video generation started ✓');
    await loadVideos();
    startProgressPolling(d.video_id);
  } catch(e) {
    ArtRium.toast(e.message || 'Failed to start generation', true);
  } finally {
    const minN = state.mode === 'flf2v' ? 2 : 1;
    btn.disabled = state.selectedImages.length < minN;
    btn.textContent = 'Generate Video';
  }
}

// ── Progress polling ──────────────────────────────────────────────────────────
// Phases that end polling and trigger a card rebuild. `review` is terminal
// from the polling-loop perspective: it stops polling and switches the card to
// the segment-selection UI; assembling resumes its own polling after the user
// confirms.
const _TERMINAL_PHASES = new Set(['done', 'failed', 'review']);

function startProgressPolling(videoId) {
  if (state.progressIntervals.has(videoId)) return;
  const intervalId = setInterval(async () => {
    try {
      const r = await api(`/api/video/jobs/${videoId}/progress`);
      const prog = await r.json();
      applyProgress(videoId, prog);
      if (_TERMINAL_PHASES.has(prog.phase)) {
        clearInterval(intervalId);
        state.progressIntervals.delete(videoId);
        if (prog.phase === 'done')        ArtRium.toast('Video ready ✓');
        else if (prog.phase === 'failed') ArtRium.toast('Video generation failed', true);
        else                              ArtRium.toast('Clips ready — pick which to merge');
        const r2 = await api(`/api/video/jobs/${videoId}`);
        updateVideoCard(await r2.json());
      }
    } catch(_) {}
  }, 4000);
  state.progressIntervals.set(videoId, intervalId);
}

// Branch on status to wire up whatever the rendered card needs next.
function _postRenderVideo(v) {
  if (v.status === 'generating' || v.status === 'assembling') startProgressPolling(v.id);
  else if (v.status === 'review') loadSegments(v.id);
}

// ── Segment review (Stapel) ───────────────────────────────────────────────────
async function loadSegments(videoId) {
  try {
    const r = await api(`/api/video/jobs/${videoId}/segments`);
    const data = await r.json();
    const segs = data.segments || [];
    // Default selection = all segments included, preserved across re-renders so
    // the user's checks survive a card rebuild.
    if (!state.segmentSelection.has(videoId)) {
      state.segmentSelection.set(videoId, new Set(segs.map(s => s.index)));
    }
    renderSegmentList(videoId, segs);
  } catch(e) {
    const host = $(`review-${videoId}`);
    if (host) host.innerHTML = `<div class="error-text">Failed to load clips: ${e.message || e}</div>`;
  }
}

function renderSegmentList(videoId, segs) {
  const host = $(`review-${videoId}`);
  if (!host) return;
  const sel = state.segmentSelection.get(videoId);
  const total = segs.length;
  const rows = segs.map(s => `
    <div class="seg-row ${sel.has(s.index) ? 'selected' : ''}" data-seg-idx="${s.index}"
         onclick="toggleSegment('${videoId}', ${s.index})">
      <div class="seg-thumb-wrap" data-seg-idx="${s.index}"
           onclick="playSegment('${videoId}', ${s.index}, event)">
        <img src="${withAuth(s.thumb_url)}" alt="">
        <video src="${withAuth(s.url)}" controls playsinline preload="none"></video>
        <div class="seg-play-icon">▶</div>
      </div>
      <div class="seg-info">
        <div class="seg-title">Clip ${s.index + 1}</div>
        <div class="seg-meta">${s.frame_count || '?'} frames</div>
        <div class="seg-prompt">${_esc(s.prompt || '— (no prompt)')}</div>
      </div>
      <div class="seg-check">✓</div>
    </div>
  `).join('');
  host.innerHTML = `
    <div class="seg-hint">${total} clip${total === 1 ? '' : 's'} ready — tap a thumbnail to preview, tap the row to toggle inclusion.</div>
    ${rows}
    <button class="seg-assemble-btn" id="assemble-${videoId}"
            ${sel.size === 0 ? 'disabled' : ''}
            onclick="assembleVideo('${videoId}')">
      Assemble Video (${sel.size}/${total} selected)
    </button>
  `;
}

function toggleSegment(videoId, idx) {
  const sel = state.segmentSelection.get(videoId);
  if (!sel) return;
  if (sel.has(idx)) sel.delete(idx);
  else sel.add(idx);
  const row = document.querySelector(`#review-${videoId} .seg-row[data-seg-idx="${idx}"]`);
  if (row) row.classList.toggle('selected', sel.has(idx));
  const btn = $(`assemble-${videoId}`);
  if (btn) {
    const total = document.querySelectorAll(`#review-${videoId} .seg-row`).length;
    btn.disabled = sel.size === 0;
    btn.textContent = `Assemble Video (${sel.size}/${total} selected)`;
  }
}

function playSegment(videoId, idx, event) {
  if (event) event.stopPropagation();
  const wrap = document.querySelector(`#review-${videoId} .seg-thumb-wrap[data-seg-idx="${idx}"]`);
  if (!wrap) return;
  if (wrap.classList.contains('playing')) return;   // already showing native controls; leave clicks to <video>
  wrap.classList.add('playing');
  const v = wrap.querySelector('video');
  if (v) v.play().catch(() => {});
}

async function assembleVideo(videoId) {
  const sel = state.segmentSelection.get(videoId);
  if (!sel || sel.size === 0) return;
  const indices = [...sel].sort((a, b) => a - b);
  const btn = $(`assemble-${videoId}`);
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }
  try {
    await api(`/api/video/jobs/${videoId}/assemble`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({indices}),
    });
    ArtRium.toast(`Assembling from ${indices.length} clip${indices.length === 1 ? '' : 's'}…`);
    state.segmentSelection.delete(videoId);
    const r = await api(`/api/video/jobs/${videoId}`);
    updateVideoCard(await r.json());
  } catch(e) {
    ArtRium.toast(e.message || 'Failed to assemble', true);
    if (btn) { btn.disabled = false; btn.textContent = `Assemble Video (${sel.size} selected)`; }
  }
}

// Ordered backend phases → visible step pills. `processing` is the default
// fallback (server-side dict miss); it maps to "Upload" so the first pill is
// active immediately after the job starts.
const PHASE_STEPS = [
  { key: 'uploading',  label: 'Upload'   },
  { key: 'submitting', label: 'Submit'   },
  { key: 'queued',     label: 'Queue'    },
  { key: 'running',    label: 'Generate' },
  { key: 'review',     label: 'Review'   },
  { key: 'finalizing', label: 'Finalize' },
  { key: 'done',       label: 'Done'     },
];
const PHASE_ORDER = Object.fromEntries(PHASE_STEPS.map((s, i) => [s.key, i]));
PHASE_ORDER.processing = 0;

function applyProgress(videoId, prog) {
  const card = document.getElementById(`vc-${videoId}`);
  if (!card) return;
  const fill = card.querySelector('.progress-fill');
  const msg  = card.querySelector('.progress-message');
  const pctEl = card.querySelector('.progress-pct');
  if (!fill) return;
  const pct = Math.max(2, Math.min(100, Number(prog.pct) || 0));
  fill.style.width = pct + '%';
  if (msg) msg.textContent = prog.message || '';
  if (pctEl) pctEl.textContent = `${Math.round(pct)}%`;

  const currentIdx = PHASE_ORDER[prog.phase] ?? 0;
  const failed = prog.phase === 'failed';
  const finished = prog.phase === 'done';
  card.querySelectorAll('.step-pill').forEach((pill, i) => {
    pill.classList.toggle('done',   !failed && (i < currentIdx || finished));
    pill.classList.toggle('active', !failed && !finished && i === currentIdx);
  });
}

// ── Video list ────────────────────────────────────────────────────────────────
async function loadVideos() {
  try {
    const r = await api('/api/video');
    state.videos = await r.json();
    renderVideos();
    for (const v of state.videos) _postRenderVideo(v);
  } catch(e) {}
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function renderVideos() {
  const list = $('videos-list');
  if (!state.videos.length) { list.innerHTML = '<div class="video-empty">No videos yet.</div>'; return; }
  list.innerHTML = '';
  for (const v of state.videos) list.appendChild(makeVideoCard(v));
}

function _videoMeta(v) {
  const n = v.n_images || '?';
  if (v.workflow === 'i2v_multi') {
    return `${n} i2v clip${n > 1 ? 's' : ''} · ${v.width}×${v.height} · ${v.fps}fps`;
  }
  return `${n} frames · ${v.width}×${v.height} · ${v.frame_count}fr · ${v.fps}fps`;
}

function makeVideoCard(v) {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.id = `vc-${v.id}`;

  const statusClass = `status-${v.status}`;
  const statusLabel = {
    generating:'Generating…', review:'Review', assembling:'Assembling…',
    done:'Done', failed:'Failed',
  }[v.status] || v.status;
  const meta = _videoMeta(v);
  const date = fmtDate(v.created_at);

  let body = '';
  if (v.status === 'done' && v.url) {
    const videoUrl = withAuth(v.url);
    const thumbUrl = v.thumb_url ? withAuth(v.thumb_url) : null;
    const stBadge = v.has_soundtrack ? '<div class="soundtrack-badge">♪</div>' : '';
    if (thumbUrl) {
      body = `
        <div class="video-preview-wrap" id="wrap-${v.id}">
          <img class="video-thumb" src="${thumbUrl}" alt="">
          ${stBadge}
          <div class="thumb-play-overlay" onclick="revealVideo('${v.id}','${videoUrl}')">
            <div class="play-icon">▶</div>
          </div>
        </div>
        <video class="preview" id="vid-${v.id}" controls playsinline preload="none">
          <source src="${videoUrl}" type="video/mp4">
        </video>`;
    } else {
      body = `<video class="preview visible" controls playsinline preload="metadata">
        <source src="${videoUrl}" type="video/mp4">
      </video>`;
    }
  } else if (v.status === 'generating' || v.status === 'assembling') {
    body = `
      <div class="progress-wrap">
        <div class="progress-steps">
          ${PHASE_STEPS.map(s => `<div class="step-pill" data-step="${s.key}">${s.label}</div>`).join('')}
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:3%"></div></div>
        <div><span class="progress-message">Starting…</span><span class="progress-pct"></span></div>
      </div>`;
  } else if (v.status === 'review') {
    body = `
      <div class="seg-review" id="review-${v.id}">
        <div class="seg-hint">Loading clips…</div>
      </div>`;
  } else if (v.status === 'failed') {
    body = `<div class="error-text">${v.error || 'Unknown error'}</div>`;
  }

  const actions = v.status === 'done' && v.url
    ? `<a class="action-btn" href="${withAuth(v.url)}" download>Download</a>
       <button class="action-btn delete" onclick="deleteVideo('${v.id}')">Delete</button>`
    : `<button class="action-btn delete" onclick="deleteVideo('${v.id}')">Delete</button>`;

  const titleVal = (v.title || '').replace(/"/g, '&quot;');
  const notesVal = (v.notes || '').replace(/</g, '&lt;');
  const editor = v.status === 'done' ? `
    <div class="video-meta-edit">
      <input type="text" class="video-title-input"
             id="title-${v.id}" placeholder="Untitled — click to add a title"
             maxlength="255" value="${titleVal}"
             oninput="markDirty('title','${v.id}')"
             onblur="saveVideoField('title','${v.id}')">
      <textarea class="video-notes-input"
                id="notes-${v.id}" placeholder="Notes…"
                rows="2"
                oninput="markDirty('notes','${v.id}')"
                onblur="saveVideoField('notes','${v.id}')">${notesVal}</textarea>
      <div class="save-indicator" id="save-ind-${v.id}"></div>
    </div>` : '';

  card.innerHTML = `
    <div class="video-header">
      <span style="font-size:13px;color:var(--text-dim)">${date}</span>
      <span class="status-badge ${statusClass}">${statusLabel}</span>
    </div>
    ${editor}
    <div class="video-meta"><strong>${meta}</strong>${v.prompt ? ' · ' + v.prompt : ''}</div>
    ${_soundtrackBlock(v)}
    ${body}
    <div class="video-actions">${actions}</div>
  `;
  return card;
}

function _soundtrackBlock(v) {
  if (v.status !== 'done' || !v.filename) return '';
  if (state.muxingVideos && state.muxingVideos.has(v.id)) {
    return `<div class="soundtrack-chip muxing">
      <span class="glyph">♪</span>
      <span class="label">Muxing soundtrack…</span>
    </div>`;
  }
  if (v.has_soundtrack) {
    return `<div class="soundtrack-chip">
      <span class="glyph">♪</span>
      <span class="label">Soundtrack</span>
      <span class="name">Attached</span>
      <button class="chip-btn" onclick="openSongPicker('${v.id}')">Replace</button>
      <button class="chip-btn remove" onclick="removeSoundtrack('${v.id}')">Remove</button>
    </div>`;
  }
  return `<div class="soundtrack-chip">
    <span class="label">Soundtrack</span>
    <button class="chip-btn add" onclick="openSongPicker('${v.id}')">+ Attach</button>
  </div>`;
}

function markDirty(field, id) {
  const el = document.getElementById(`${field}-${id}`);
  if (el) el.classList.add('dirty');
  const ind = document.getElementById(`save-ind-${id}`);
  if (ind) { ind.textContent = ''; ind.classList.remove('saved','error'); }
}

async function saveVideoField(field, id) {
  const el = document.getElementById(`${field}-${id}`);
  if (!el || !el.classList.contains('dirty')) return;
  const ind = document.getElementById(`save-ind-${id}`);
  const value = el.value;
  try {
    await api(`/api/video/jobs/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [field]: value }),
    });
    el.classList.remove('dirty');
    if (ind) {
      ind.textContent = field === 'title' ? 'Title saved' : 'Notes saved';
      ind.classList.add('saved');
      ind.classList.remove('error');
      setTimeout(() => { if (ind.classList.contains('saved')) ind.textContent = ''; }, 1800);
    }
    // Update local cache so re-renders don't wipe the value
    const cached = state.videos.find(v => v.id === id);
    if (cached) cached[field] = value;
  } catch (e) {
    if (ind) {
      ind.textContent = 'Save failed: ' + e.message;
      ind.classList.add('error');
      ind.classList.remove('saved');
    }
  }
}

function revealVideo(videoId, videoUrl) {
  const wrap = document.getElementById(`wrap-${videoId}`);
  const vid  = document.getElementById(`vid-${videoId}`);
  if (wrap) wrap.style.display = 'none';
  if (vid)  { vid.classList.add('visible'); vid.play(); }
}

function updateVideoCard(v) {
  const existing = $(`vc-${v.id}`);
  const newCard = makeVideoCard(v);
  if (existing) {
    existing.replaceWith(newCard);
  } else {
    const list = $('videos-list');
    if (list.querySelector('.video-empty')) list.innerHTML = '';
    list.prepend(newCard);
  }
  // Keep the in-memory list in sync so subsequent loadVideos() doesn't roll
  // back to a stale status snapshot on a soft reload.
  const idx = state.videos.findIndex(x => x.id === v.id);
  if (idx >= 0) state.videos[idx] = v; else state.videos.unshift(v);
  _postRenderVideo(v);
}

async function deleteVideo(id) {
  try {
    await api(`/api/video/${id}`, {method:'DELETE'});
    state.videos = state.videos.filter(v => v.id !== id);
    clearInterval(state.progressIntervals.get(id));
    state.progressIntervals.delete(id);
    state.segmentSelection.delete(id);
    ArtRium.toast('Deleted');
    renderVideos();
  } catch(e) { ArtRium.toast('Delete failed', true); }
}

// ── Soundtrack ────────────────────────────────────────────────────────────────
state.songs = [];
state.songPickerVideoId = null;
state.songPickerSearch = '';
state.muxingVideos = new Set();

async function openSongPicker(videoId) {
  state.songPickerVideoId = videoId;
  state.songPickerSearch = '';
  $('song-picker-search').value = '';
  $('song-picker-modal').classList.add('show');
  $('song-list').innerHTML = '<div style="color:var(--text-dim);padding:20px;text-align:center">Loading…</div>';
  await loadSongs();
  renderSongList();
}

function closeSongPicker() {
  $('song-picker-modal').classList.remove('show');
  state.songPickerVideoId = null;
  // Stop any audio previews still playing inside the modal
  document.querySelectorAll('#song-list audio').forEach(a => { try { a.pause(); } catch(e) {} });
}

async function loadSongs() {
  try {
    const r = await api('/api/music');
    const songs = await r.json();
    state.songs = (songs || []).filter(s => s.status === 'done' && s.filename);
  } catch (e) {
    state.songs = [];
    ArtRium.toast('Failed to load songs', true);
  }
}

function renderSongList() {
  const list = $('song-list');
  const q = state.songPickerSearch.trim().toLowerCase();
  const filtered = !q ? state.songs : state.songs.filter(s =>
    (s.title || '').toLowerCase().includes(q) || (s.tags || '').toLowerCase().includes(q)
  );
  if (!filtered.length) {
    list.innerHTML = '<div style="color:var(--text-dim);padding:20px;text-align:center">No songs available. Generate one in the Music tool first.</div>';
    return;
  }
  const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  list.innerHTML = filtered.map(s => {
    const title = esc(s.title || 'Untitled song');
    const tags = esc(s.tags || '');
    const audioUrl = withAuth(s.url);
    const metaBits = [];
    if (s.duration_seconds) metaBits.push(`${s.duration_seconds}s`);
    if (s.bpm) metaBits.push(`${s.bpm} BPM`);
    if (s.musical_key) metaBits.push(esc(s.musical_key));
    return `<div class="song-row">
      <div class="row-head">
        <div class="title">${title}</div>
        <div class="meta">${metaBits.join(' · ')}</div>
      </div>
      ${tags ? `<div class="tags">${tags}</div>` : ''}
      <audio controls preload="none" src="${audioUrl}"></audio>
      <button class="use-btn" onclick="useSong('${s.id}')">Use this</button>
    </div>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  const searchEl = $('song-picker-search');
  if (searchEl) searchEl.addEventListener('input', e => {
    state.songPickerSearch = e.target.value;
    renderSongList();
  });
});

async function useSong(songId) {
  const videoId = state.songPickerVideoId;
  if (!videoId) return;
  closeSongPicker();
  state.muxingVideos.add(videoId);
  const cached = state.videos.find(v => v.id === videoId);
  if (cached) updateVideoCard(cached);
  try {
    await api(`/api/video/jobs/${videoId}/soundtrack`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({song_id: songId}),
    });
    pollSoundtrackMux(videoId);
  } catch (e) {
    state.muxingVideos.delete(videoId);
    if (cached) updateVideoCard(cached);
    ArtRium.toast('Attach failed: ' + e.message, true);
  }
}

async function removeSoundtrack(videoId) {
  if (!confirm('Remove soundtrack?')) return;
  try {
    const r = await api(`/api/video/jobs/${videoId}/soundtrack`, {method: 'DELETE'});
    const updated = await r.json();
    updateVideoCard(updated);
    ArtRium.toast('Soundtrack removed');
  } catch (e) {
    ArtRium.toast('Remove failed: ' + e.message, true);
  }
}

function pollSoundtrackMux(videoId) {
  // The mux task runs in the background. video.status stays 'done' the whole
  // time; we know it finished when has_soundtrack flips true or error is set.
  const startedAt = Date.now();
  const interval = setInterval(async () => {
    try {
      const r = await api(`/api/video/jobs/${videoId}`);
      const v = await r.json();
      if (v.has_soundtrack) {
        clearInterval(interval);
        state.muxingVideos.delete(videoId);
        updateVideoCard(v);
        ArtRium.toast('Soundtrack added');
        return;
      }
      if (v.error) {
        clearInterval(interval);
        state.muxingVideos.delete(videoId);
        updateVideoCard(v);
        ArtRium.toast('Mux failed: ' + v.error, true);
        return;
      }
    } catch (e) { /* transient network error — keep polling */ }
    // Hard cap at 5 minutes
    if (Date.now() - startedAt > 5 * 60 * 1000) {
      clearInterval(interval);
      state.muxingVideos.delete(videoId);
      ArtRium.toast('Mux took too long — refresh to see status', true);
    }
  }, 2000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  renderStrip();
  await loadVideos();
});
</script>
</body>
