<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>Video — art-rium</title>
  <link rel="stylesheet" href="/shared/shared.css">
  <style>
    .app { display: flex; flex-direction: column; height: 100dvh; max-width: 680px; margin: 0 auto; padding-top: env(safe-area-inset-top); }
    header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .back-btn { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; padding: 0 4px 0 0; }
    header h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; flex: 1; }
    main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── Form panel ── */
    #form-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .card h2 { font-size: 15px; font-weight: 700; }

    /* Images strip */
    .images-strip { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; min-height: 72px; }
    .images-strip::-webkit-scrollbar { display: none; }
    .sel-wrap { position: relative; flex-shrink: 0; width: 72px; height: 72px; }
    .sel-wrap img { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; display: block; }
    .sel-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--red); color: #fff; border: none; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .sel-order { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.65); color: #fff; font-size: 10px; font-weight: 700; border-radius: 4px; padding: 1px 5px; }
    .add-btn { flex-shrink: 0; width: 72px; height: 72px; border-radius: 10px; border: 1.5px dashed var(--border); background: var(--surface2); color: var(--text-dim); font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* Settings rows */
    .field-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .field-label { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; min-width: 80px; }
    .field-select, .field-input {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; font-weight: 600;
      padding: 6px 10px; outline: none; font-family: inherit;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .field-select:focus, .field-input:focus { border-color: var(--accent); }
    .field-input { width: 80px; text-align: center; }

    /* Resolution chips */
    .res-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .res-chip { font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; font-family: inherit; transition: all 0.13s; }
    .res-chip.active { background: var(--accent); border-color: var(--accent); color: #000; }

    /* Prompt */
    textarea#prompt-input { width: 100%; resize: none; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 12px; outline: none; font-family: inherit; line-height: 1.5; transition: border-color 0.2s; min-height: 60px; }
    textarea#prompt-input:focus { border-color: var(--accent); }
    textarea#prompt-input::placeholder { color: var(--text-dim); }

    /* Generate button */
    .gen-btn { width: 100%; padding: 14px; border-radius: var(--radius); border: none; background: var(--accent); color: #000; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.13s; }
    .gen-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Video list ── */
    #videos-section { padding: 16px; }
    .section-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    .video-empty { text-align: center; padding: 32px 0; color: var(--text-dim); font-size: 14px; }

    .video-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
    .video-header { display: flex; justify-content: space-between; align-items: center; }
    .video-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 8px; flex-wrap: wrap; }
    .video-meta strong { color: var(--text); font-weight: 600; }
    .status-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 5px; }
    .status-generating { background: rgba(10,132,255,0.15); color: var(--accent); }
    .status-done       { background: rgba(50,215,75,0.15);  color: var(--green); }
    .status-failed     { background: rgba(255,69,58,0.15);  color: var(--red); }

    /* Thumbnail + video preview */
    .video-preview-wrap { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
    .video-thumb { width: 100%; max-height: 280px; object-fit: contain; display: block; border-radius: 10px; }
    .thumb-play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); cursor: pointer; border-radius: 10px; transition: background 0.15s; }
    .thumb-play-overlay:hover { background: rgba(0,0,0,0.15); }
    .play-icon { width: 52px; height: 52px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    video.preview { width: 100%; border-radius: 10px; max-height: 320px; background: #000; display: none; }
    video.preview.visible { display: block; }

    .error-text { font-size: 12px; color: var(--red); word-break: break-all; }

    /* ── Progress bar ── */
    .progress-wrap { display: flex; flex-direction: column; gap: 6px; }
    .progress-track { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), #7dd3fc);
      transition: width 0.6s ease;
    }
    .progress-fill.pulse {
      background: linear-gradient(90deg, var(--accent) 0%, #7dd3fc 50%, var(--accent) 100%);
      background-size: 200% 100%;
      animation: progress-shimmer 1.6s linear infinite;
      width: 100% !important;
    }
    @keyframes progress-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .progress-message { font-size: 12px; color: var(--text-dim); }

    .video-actions { display: flex; gap: 8px; }
    .action-btn { flex: 1; padding: 9px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; text-align: center; text-decoration: none; }
    .action-btn.delete { background: rgba(255,69,58,0.08); color: var(--red); border-color: rgba(255,69,58,0.2); }

    /* ── Picker modal ── */
    #picker-modal { display: none; position: fixed; inset: 0; z-index: 100; background: var(--bg); flex-direction: column; padding-top: env(safe-area-inset-top); }
    #picker-modal.show { display: flex; }
    .picker-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .picker-header h2 { font-size: 17px; font-weight: 700; flex: 1; }
    .picker-done-btn { background: var(--accent); border: none; color: #000; font-size: 14px; font-weight: 700; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .picker-search { padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #picker-search { width: 100%; background: var(--surface2); border: 1.5px solid transparent; border-radius: 10px; color: var(--text); font-size: 15px; padding: 9px 14px; outline: none; font-family: inherit; }
    #picker-search:focus { border-color: var(--accent); }
    #picker-grid { flex: 1; min-height: 0; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 3px; }
    .picker-cell { position: relative; height: 0; padding-bottom: 100%; cursor: pointer; overflow: hidden; border-radius: 4px; background: var(--surface2); }
    .picker-cell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
    .sel-overlay { position: absolute; inset: 0; background: rgba(10,132,255,0.35); display: none; align-items: center; justify-content: center; font-size: 28px; color: #fff; }
    .picker-cell.selected .sel-overlay { display: flex; }
    .picker-cell.selected { outline: 3px solid var(--accent); outline-offset: -3px; }
    .order-badge { position: absolute; top: 5px; left: 5px; background: var(--accent); color: #000; font-size: 11px; font-weight: 700; border-radius: 50%; width: 20px; height: 20px; display: none; align-items: center; justify-content: center; }
    .picker-cell.selected .order-badge { display: flex; }
    .picker-count { background: var(--accent); color: #000; font-size: 12px; font-weight: 700; border-radius: 10px; padding: 2px 8px; display: none; }
    .picker-count.show { display: inline-block; }

    #toast { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 90px); left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: rgba(255,69,58,0.2); color: var(--red); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <button class="back-btn" onclick="history.back()">‹</button>
    <h1>Video Generator</h1>
  </header>

  <main>
    <!-- Form -->
    <div id="form-section">
      <div class="card">
        <h2>New Key-Frame Video</h2>

        <!-- Image picker strip -->
        <div>
          <div class="images-strip" id="images-strip">
            <button class="add-btn" id="add-btn" onclick="openPicker()">+</button>
          </div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:6px" id="img-hint">
            Select 2–3 key frames in order. The AI animates transitions between them.
          </div>
        </div>

        <!-- Resolution -->
        <div class="field-row">
          <span class="field-label">Resolution</span>
          <div class="res-chips" id="res-chips">
            <button class="res-chip active" data-w="1088" data-h="1088" onclick="setRes(1088,1088,this)">1088×1088</button>
            <button class="res-chip" data-w="1920" data-h="1088" onclick="setRes(1920,1088,this)">1920×1088</button>
            <button class="res-chip" data-w="1088" data-h="1920" onclick="setRes(1088,1920,this)">1088×1920</button>
          </div>
        </div>

        <!-- Frames per transition -->
        <div class="field-row">
          <span class="field-label">Frames</span>
          <input class="field-input" type="number" id="frame-count" value="25" min="5" max="81" step="1">
          <span style="font-size:13px;color:var(--text-dim)">per transition</span>
        </div>

        <!-- FPS -->
        <div class="field-row">
          <span class="field-label">FPS</span>
          <select class="field-select" id="fps-select">
            <option value="16">16</option>
            <option value="24" selected>24</option>
            <option value="30">30</option>
          </select>
        </div>

        <!-- Prompt -->
        <textarea id="prompt-input" rows="2" placeholder="Optional motion prompt (e.g. 'slow zoom in, cinematic')"></textarea>

        <button class="gen-btn" id="gen-btn" onclick="generate()" disabled>Generate Video</button>
      </div>
    </div>

    <!-- Video list -->
    <div id="videos-section">
      <div class="section-label">Generated Videos</div>
      <div id="videos-list">
        <div class="video-empty">No videos yet.</div>
      </div>
    </div>
  </main>
</div>

<!-- Picker -->
<div id="picker-modal">
  <div class="picker-header">
    <button class="back-btn" onclick="closePicker()">✕</button>
    <h2>Choose Key Frames</h2>
    <span class="picker-count" id="picker-count">0</span>
    <button class="picker-done-btn" onclick="closePicker()">Done</button>
  </div>
  <div class="picker-search">
    <input type="search" id="picker-search" placeholder="Search images…" autocomplete="off">
  </div>
  <div id="picker-grid"></div>
</div>

<div id="toast"></div>

<script src="/shared/shared.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  apiKey: ArtRium.getApiKey(),
  selectedImages: [],
  width: 1088, height: 1088,
  pickerImages: [], pickerSearch: '', pickerPage: 0, pickerLoading: false, pickerDone: false,
  pickerSelection: new Map(),
  videos: [],
  pollingJobs: new Set(),
  progressIntervals: new Map(),   // video_id → intervalId
};

const $ = id => document.getElementById(id);
const api = (url, opts={}) => ArtRium.apiFetch(url, opts, state.apiKey);
const withAuth = url => ArtRium.withAuth(url, state.apiKey);
const PICKER_LIMIT = 30;

// ── Resolution ────────────────────────────────────────────────────────────────
function setRes(w, h, el) {
  state.width = w; state.height = h;
  document.querySelectorAll('.res-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// ── Strip rendering ───────────────────────────────────────────────────────────
function renderStrip() {
  const strip = $('images-strip');
  strip.querySelectorAll('.sel-wrap').forEach(el => el.remove());
  const addBtn = $('add-btn');
  state.selectedImages.forEach((img, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'sel-wrap';
    wrap.innerHTML = `<img src="${withAuth(img.thumb_url)}" alt=""><span class="sel-order">${idx+1}</span>
      <button class="sel-remove" onclick="removeImage(${idx})">×</button>`;
    strip.insertBefore(wrap, addBtn);
  });
  const n = state.selectedImages.length;
  addBtn.style.display = n >= 3 ? 'none' : '';
  $('img-hint').textContent = n === 0
    ? 'Select 2–3 key frames in order. The AI animates transitions between them.'
    : n < 2 ? `${n} selected — add at least one more.`
    : `${n} key frames · ${n-1} transition${n>2?'s':''}.`;
  $('gen-btn').disabled = n < 2;
}

function removeImage(idx) {
  state.selectedImages.splice(idx, 1);
  renderStrip();
}

// ── Image picker ──────────────────────────────────────────────────────────────
function openPicker() {
  state.pickerSelection = new Map(state.selectedImages.map((img,i) => [img.id, i+1]));
  $('picker-modal').classList.add('show');
  if (!state.pickerImages.length) loadPickerImages(true);
  else refreshPickerCells();
  updatePickerCount();
}

function closePicker() {
  $('picker-modal').classList.remove('show');
  const ordered = [...state.pickerSelection.entries()].sort((a,b)=>a[1]-b[1]).map(([id])=>state.pickerImages.find(img=>img.id===id)).filter(Boolean);
  const inGrid = new Set(state.pickerImages.map(i=>i.id));
  const preserved = state.selectedImages.filter(img=>!inGrid.has(img.id));
  state.selectedImages = [...ordered, ...preserved];
  renderStrip();
}

async function loadPickerImages(reset=false) {
  if (state.pickerLoading) return;
  if (!reset && state.pickerDone) return;
  if (reset) { state.pickerImages=[]; state.pickerPage=0; state.pickerDone=false; $('picker-grid').innerHTML=''; }
  state.pickerLoading = true;
  const offset = state.pickerPage * PICKER_LIMIT;
  const search = state.pickerSearch ? `&search=${encodeURIComponent(state.pickerSearch)}` : '';
  try {
    const r = await api(`/api/images?limit=${PICKER_LIMIT}&offset=${offset}${search}`);
    const imgs = await r.json();
    if (imgs.length < PICKER_LIMIT) state.pickerDone = true;
    state.pickerPage++;
    state.pickerImages.push(...imgs);
    appendPickerCells(imgs);
  } catch(e) { ArtRium.toast('Failed to load images', true); }
  finally { state.pickerLoading = false; }
}

function appendPickerCells(imgs) {
  const grid = $('picker-grid');
  for (const img of imgs) {
    const cell = document.createElement('div');
    cell.className = 'picker-cell';
    cell.dataset.id = img.id;
    const order = state.pickerSelection.get(img.id);
    if (order !== undefined) cell.classList.add('selected');
    cell.innerHTML = `<img src="${withAuth(img.thumb_url)}" alt=""><div class="sel-overlay">✓</div><div class="order-badge">${order||''}</div>`;
    cell.onclick = () => toggleCell(cell, img);
    grid.appendChild(cell);
  }
}

function toggleCell(cell, img) {
  if (state.pickerSelection.has(img.id)) {
    state.pickerSelection.delete(img.id);
    const sorted = [...state.pickerSelection.entries()].sort((a,b)=>a[1]-b[1]);
    state.pickerSelection = new Map(sorted.map(([id],i)=>[id,i+1]));
  } else {
    if (state.pickerSelection.size >= 3) { ArtRium.toast('Maximum 3 key frames', true); return; }
    state.pickerSelection.set(img.id, state.pickerSelection.size+1);
  }
  refreshPickerCells();
  updatePickerCount();
}

function refreshPickerCells() {
  $('picker-grid').querySelectorAll('.picker-cell').forEach(cell => {
    const order = state.pickerSelection.get(cell.dataset.id);
    cell.classList.toggle('selected', order !== undefined);
    const badge = cell.querySelector('.order-badge');
    if (badge) badge.textContent = order !== undefined ? order : '';
  });
}

function updatePickerCount() {
  const n = state.pickerSelection.size;
  const el = $('picker-count');
  el.textContent = n;
  el.classList.toggle('show', n > 0);
}

let _searchTimer;
$('picker-search').addEventListener('input', e => {
  clearTimeout(_searchTimer);
  state.pickerSearch = e.target.value;
  _searchTimer = setTimeout(() => loadPickerImages(true), 350);
});
$('picker-grid').addEventListener('scroll', () => {
  const el = $('picker-grid');
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - 80) loadPickerImages(false);
});

// ── Generate ──────────────────────────────────────────────────────────────────
async function generate() {
  if (state.selectedImages.length < 2) return;
  const btn = $('gen-btn');
  btn.disabled = true; btn.textContent = 'Queuing…';
  try {
    const r = await api('/api/video/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        image_ids: state.selectedImages.map(i=>i.id),
        width:  state.width,
        height: state.height,
        frame_count: parseInt($('frame-count').value)||25,
        fps: parseInt($('fps-select').value)||24,
        prompt: $('prompt-input').value.trim(),
      }),
    });
    const d = await r.json();
    ArtRium.toast('Video generation started ✓');
    await loadVideos();
    startProgressPolling(d.video_id);
  } catch(e) {
    ArtRium.toast(e.message||'Failed to start generation', true);
  } finally {
    btn.disabled = state.selectedImages.length < 2;
    btn.textContent = 'Generate Video';
  }
}

// ── Progress polling ──────────────────────────────────────────────────────────
function startProgressPolling(videoId) {
  if (state.progressIntervals.has(videoId)) return;
  const intervalId = setInterval(async () => {
    try {
      const r = await api(`/api/video/jobs/${videoId}/progress`);
      const prog = await r.json();
      applyProgress(videoId, prog);
      if (prog.phase === 'done' || prog.phase === 'failed') {
        clearInterval(intervalId);
        state.progressIntervals.delete(videoId);
        if (prog.phase === 'done') {
          ArtRium.toast('Video ready ✓');
          const r2 = await api(`/api/video/jobs/${videoId}`);
          const v = await r2.json();
          updateVideoCard(v);
        } else {
          ArtRium.toast('Video generation failed', true);
          const r2 = await api(`/api/video/jobs/${videoId}`);
          const v = await r2.json();
          updateVideoCard(v);
        }
      }
    } catch(_) {}
  }, 4000);
  state.progressIntervals.set(videoId, intervalId);
}

function applyProgress(videoId, prog) {
  const card = document.getElementById(`vc-${videoId}`);
  if (!card) return;
  const track  = card.querySelector('.progress-track');
  const fill   = card.querySelector('.progress-fill');
  const msg    = card.querySelector('.progress-message');
  if (!track) return;

  const pct = prog.pct || 0;
  const isPulse = prog.phase === 'running' || prog.phase === 'queued';

  if (isPulse) {
    fill.classList.add('pulse');
    fill.style.width = '100%';
  } else {
    fill.classList.remove('pulse');
    fill.style.width = pct + '%';
  }
  if (msg) msg.textContent = prog.message || '';
}

// ── Video list ────────────────────────────────────────────────────────────────
async function loadVideos() {
  try {
    const r = await api('/api/video');
    state.videos = await r.json();
    renderVideos();
    for (const v of state.videos) {
      if (v.status === 'generating') startProgressPolling(v.id);
    }
  } catch(e) {}
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function renderVideos() {
  const list = $('videos-list');
  if (!state.videos.length) { list.innerHTML = '<div class="video-empty">No videos yet.</div>'; return; }
  list.innerHTML = '';
  for (const v of state.videos) {
    list.appendChild(makeVideoCard(v));
  }
}

function makeVideoCard(v) {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.id = `vc-${v.id}`;

  const statusClass = `status-${v.status}`;
  const statusLabel = {generating:'Generating…',done:'Done',failed:'Failed'}[v.status]||v.status;
  const meta = `${v.n_images||'?'} frames · ${v.width}×${v.height} · ${v.frame_count}fr · ${v.fps}fps`;
  const date = fmtDate(v.created_at);

  let body = '';
  if (v.status === 'done' && v.url) {
    const videoUrl = withAuth(v.url);
    const thumbUrl = v.thumb_url ? withAuth(v.thumb_url) : null;
    if (thumbUrl) {
      body = `
        <div class="video-preview-wrap" id="wrap-${v.id}">
          <img class="video-thumb" src="${thumbUrl}" alt="">
          <div class="thumb-play-overlay" onclick="revealVideo('${v.id}','${videoUrl}')">
            <div class="play-icon">▶</div>
          </div>
        </div>
        <video class="preview" id="vid-${v.id}" controls playsinline preload="none">
          <source src="${videoUrl}" type="video/mp4">
        </video>`;
    } else {
      body = `<video class="preview visible" controls playsinline preload="metadata">
        <source src="${videoUrl}" type="video/mp4">
      </video>`;
    }
  } else if (v.status === 'generating') {
    body = `
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill pulse" style="width:100%"></div></div>
        <div class="progress-message">Starting…</div>
      </div>`;
  } else if (v.status === 'failed') {
    body = `<div class="error-text">${v.error||'Unknown error'}</div>`;
  }

  const actions = v.status === 'done' && v.url
    ? `<a class="action-btn" href="${withAuth(v.url)}" download>Download</a>
       <button class="action-btn delete" onclick="deleteVideo('${v.id}')">Delete</button>`
    : `<button class="action-btn delete" onclick="deleteVideo('${v.id}')">Delete</button>`;

  card.innerHTML = `
    <div class="video-header">
      <span style="font-size:13px;color:var(--text-dim)">${date}</span>
      <span class="status-badge ${statusClass}">${statusLabel}</span>
    </div>
    <div class="video-meta"><strong>${meta}</strong>${v.prompt ? ' · ' + v.prompt : ''}</div>
    ${body}
    <div class="video-actions">${actions}</div>
  `;
  return card;
}

function revealVideo(videoId, videoUrl) {
  const wrap = document.getElementById(`wrap-${videoId}`);
  const vid  = document.getElementById(`vid-${videoId}`);
  if (wrap) wrap.style.display = 'none';
  if (vid)  { vid.classList.add('visible'); vid.play(); }
}

function updateVideoCard(v) {
  const existing = $(`vc-${v.id}`);
  const newCard = makeVideoCard(v);
  if (existing) {
    existing.replaceWith(newCard);
  } else {
    const list = $('videos-list');
    if (list.querySelector('.video-empty')) list.innerHTML = '';
    list.prepend(newCard);
  }
  // Resume progress polling if still generating
  if (v.status === 'generating') startProgressPolling(v.id);
}

async function deleteVideo(id) {
  try {
    await api(`/api/video/${id}`, {method:'DELETE'});
    state.videos = state.videos.filter(v=>v.id!==id);
    clearInterval(state.progressIntervals.get(id));
    state.progressIntervals.delete(id);
    ArtRium.toast('Deleted');
    renderVideos();
  } catch(e) { ArtRium.toast('Delete failed', true); }
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  renderStrip();
  await loadVideos();
});
</script>
</body>
</html>
